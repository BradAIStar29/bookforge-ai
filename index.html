<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BookForge AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{margin:0;font-family:system-ui,sans-serif;background:#0f0a1e}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:rgba(255,255,255,.05)}::-webkit-scrollbar-thumb{background:rgba(139,92,246,.4);border-radius:3px}
.spin{animation:spin 1s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.pulse-a{animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ── Constants ────────────────────────────────────────────────────────────
const GEMINI_URL="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent";
const DAILY_LIMIT=1500;
const GENRES=["Fiction - Romance","Fiction - Gay Romance","Fiction - LGBT+","Fiction - Thriller","Fiction - Fantasy","Fiction - Sci-Fi","Fiction - Mystery","Fiction - Horror","Self-Help","Business & Finance"];
const AUDIENCES=["General Adults","Young Adults (18-25)","LGBT+ Readers","Women","Men","Professionals & Entrepreneurs","Parents","Students","Seniors","Beginners","Advanced Readers"];
const STATUS_COLORS={idea:"bg-gray-500/20 text-gray-300",outlining:"bg-blue-500/20 text-blue-300",writing:"bg-yellow-500/20 text-yellow-300",ready:"bg-green-500/20 text-green-300",published:"bg-purple-500/20 text-purple-300",queued:"bg-cyan-500/20 text-cyan-300"};
const STATUS_ICONS={idea:"💡",outlining:"📋",writing:"✍️",ready:"✅",published:"🚀",queued:"⏳"};

// ── Storage ────────────────────────────────────────────────────────────
const ls={get:(k,d)=>{try{const v=localStorage.getItem(k);return v===null?d:JSON.parse(v)}catch{return d}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};
const getKey=()=>localStorage.getItem("gemini_api_key")||"";
const setKey=k=>localStorage.setItem("gemini_api_key",k.trim());
const getBooks=()=>ls.get("bfai_books",[]);
const setBooks=b=>{ls.set("bfai_books",b);};
const getBook=id=>getBooks().find(b=>b.id===id)||null;
const getSeries=()=>ls.get("bfai_series",[]);
const setSeries=s=>ls.set("bfai_series",s);
const getSeriesById=id=>getSeries().find(s=>s.id===id)||null;
const getQueue=()=>ls.get("bfai_queue",[]);
const setQueue=q=>ls.set("bfai_queue",q);
const updateBook=(id,upd)=>{const books=getBooks();const i=books.findIndex(b=>b.id===id);if(i===-1)return null;books[i]={...books[i],...upd};setBooks(books);return books[i];};
const getUsage=()=>{const today=new Date().toISOString().split("T")[0];const d=ls.get("bfai_usage",{});return d.date===today?(d.count||0):0;};
const trackUsage=()=>{const today=new Date().toISOString().split("T")[0];const d=ls.get("bfai_usage",{});const c=(d.date===today?d.count:0)+1;ls.set("bfai_usage",{date:today,count:c});return c;};

// ── Gemini ─────────────────────────────────────────────────────────────
async function callGemini(prompt,temp=0.85){
  const key=getKey();
  if(!key)throw{code:"NO_KEY"};
  const res=await fetch(`${GEMINI_URL}?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:temp}})});
  const data=await res.json();
  if(!res.ok){
    if(res.status===401||res.status===403)throw{code:"BAD_KEY"};
    if(res.status===429||data?.error?.status==="RESOURCE_EXHAUSTED")throw{code:"QUOTA"};
    throw{code:"ERROR",msg:data?.error?.message||`HTTP ${res.status}`};
  }
  const text=data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text){if(data?.candidates?.[0]?.finishReason==="SAFETY")throw{code:"SAFETY"};throw{code:"EMPTY"};}
  return text;
}
const errMsg=e=>{const c=e?.code||"ERROR";if(c==="NO_KEY"||c==="BAD_KEY")return"🔑 API key missing or invalid — check Settings.";if(c==="QUOTA")return"⏳ Daily Gemini limit reached. Resets tomorrow.";if(c==="SAFETY")return"⚠️ Response blocked by safety filter.";if(c==="PARSE")return"❌ Failed parsing response.";return`❌ ${c}`};

// ── Series helpers ──────────────────────────────────────────────────────
function buildSeriesContext(series){
  if(!series)return"";
  const p=series.plan||{};
  let ctx=`=== SERIES BIBLE: "${series.name}" ===\n`;
  ctx+=`Genre: ${series.genre} | Audience: ${series.audience}\nConcept: ${series.concept}\n\n`;
  if(p.world_setting)ctx+=`WORLD/SETTING:\n${p.world_setting}\n\n`;
  if(p.world_rules?.length)ctx+=`WORLD RULES:\n${p.world_rules.map(r=>`• ${r}`).join("\n")}\n\n`;
  if(p.tone_style)ctx+=`TONE & STYLE: ${p.tone_style}\n\n`;
  if(series.character_roster?.length){
    ctx+=`CHARACTERS:\n`;
    series.character_roster.forEach(c=>{ctx+=`• ${c.name} [${c.role||""}]: ${c.description||""}\n`;});ctx+="\n";
  }
  if(series.world_locations?.length){
    ctx+=`LOCATIONS:\n`;
    series.world_locations.forEach(l=>{ctx+=`• ${l.name}: ${l.description||""}\n`;});ctx+="\n";
  }
  if(series.plot_events?.length){
    ctx+=`KEY EVENTS:\n`;
    series.plot_events.forEach(e=>{ctx+=`• [${e.book}] ${e.event}\n`;});ctx+="\n";
  }
  ctx+=`=== END SERIES BIBLE ===\n`;
  return ctx;
}

// ── Shared UI ────────────────────────────────────────────────────────
function Spin({size="h-5 w-5"}){return<svg className={`spin ${size}`} fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v0a8 8 0 018 8" /></svg>;}
function ScoreBadge({score}){const color=score>=80?"text-green-400 border-green-500/40 bg-green-500/10":score>=60?"text-amber-400 border-amber-500/40 bg-amber-500/10":"text-red-400 border-red-500/40 bg-red-500/10";return<span className={`inline-block border rounded px-2 py-1 text-xs font-bold ${color}`}>{score}</span>;}
function Card({children,className=""}){return<div className={`bg-white/5 border border-white/10 rounded-2xl p-6 ${className}`}>{children}</div>;}

// ── Settings Modal ─────────────────────────────────────────────────────
function SettingsModal({onClose}){
  const [draft,setDraft]=useState(getKey());
  const [saved,setSaved]=useState(false);
  const save=()=>{if(!draft.trim())return;setKey(draft);setSaved(true);setTimeout(()=>{setSaved(false);onClose();},900);};
  return(
    <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
      <div className="bg-slate-800 border border-white/10 rounded-2xl p-8 max-w-md w-full shadow-2xl">
        <div className="flex items-center justify-between mb-6"><h2 className="text-white text-xl font-bold">⚙️ Settings</h2><button onClick={onClose} className="text-white/30 hover:text-white text-xl">✕</button></div>
        <label className="text-white/60 text-sm font-medium block mb-2">Gemini API Key</label>
        <p className="text-white/35 text-xs mb-3">🔒 Stored locally in your browser. Never sent to servers.</p>
        <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="inline-block text-purple-400 text-xs underline mb-4 hover:text-purple-300">Get a free key →</a>
        <input type="password" placeholder="AIza..." value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()} className="w-full bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-white mb-4 focus:outline-none focus:border-purple-500"/>
        <button onClick={save} disabled={!draft.trim()} className={`w-full py-3 rounded-xl font-semibold transition-all ${saved?"bg-green-500 text-white":"bg-gradient-to-r from-purple-500 to-pink-500 text-white hover:opacity-90 disabled:opacity-50"}`}>{saved?"✓ Saved!":"Save API Key"}</button>
      </div>
    </div>
  );
}

// ── Header ─────────────────────────────────────────────────────────
function Header({onBack,title,subtitle,onSettings,activeTab,setActiveTab}){
  const [usage,setUsage]=useState(getUsage());
  useEffect(()=>{const t=setInterval(()=>setUsage(getUsage()),3000);return()=>clearInterval(t);},[]);
  const pct=Math.min(Math.round((usage/DAILY_LIMIT)*100),100);
  const qLen=getQueue().length;
  return(
    <div className="border-b border-white/10 bg-black/30 backdrop-blur-sm sticky top-0 z-20">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
        <div className="flex items-center gap-3 min-w-0">
          {onBack&&<button onClick={onBack} className="text-white/40 hover:text-white text-sm shrink-0">← Back</button>}
          <div className="w-9 h-9 bg-gradient-to-br from-purple-500 to-pink-500 rounded-xl flex items-center justify-center text-lg shrink-0">📚</div>
          <div className="min-w-0"><h1 className="text-white font-bold text-base leading-tight truncate">{title||"BookForge AI"}</h1>{subtitle&&<p className="text-white/30 text-xs truncate">{subtitle}</p>}</div>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          <div className="bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 flex items-center gap-2">
            <span className={`text-xs font-bold ${pct>=90?"text-red-400":pct>=70?"text-amber-400":"text-green-400"}`}>{usage}/{DAILY_LIMIT}</span>
            <div className="w-10 h-1 bg-white/10 rounded-full overflow-hidden"><div className={`h-full rounded-full ${pct>=90?"bg-red-500":pct>=70?"bg-amber-500":"bg-green-500"}`} style={{width:`${pct}%`}}></div></div>
          </div>
          {qLen>0&&<div className="bg-cyan-500/20 border border-cyan-500/30 text-cyan-300 text-xs px-2.5 py-1.5 rounded-lg">⏳ Queue: {qLen}</div>}
          <button onClick={onSettings} className={`text-xs px-3 py-1.5 rounded-lg border transition-all ${getKey()?"border-white/20 text-white/50 hover:border-white/40":"border-red-500/50 text-red-400"}`}>⚙️</button>
        </div>
      </div>
      {setActiveTab&&(
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex gap-1">
          {[["📚 Library","library"],["📗 Series","series"],["⏳ Queue","queue"]].map(([label,id])=>(
            <button key={id} onClick={()=>setActiveTab(id)} className={`px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-t-lg transition-all ${activeTab===id?"bg-white/10 text-white border-b-2 border-purple-400":"text-white/40 hover:text-white/60"}`}>{label}</button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Review Agent ────────────────────────────────────────────────────────
async function runReviewAgent(book){
  const outline=JSON.parse(book.outline||"{}");
  const raw=await callGemini(
    `You are a professional book publishing strategist and Amazon KDP expert.\n\n`+
    `Book: ${book.title}\nGenre: ${book.genre}\nAudience: ${book.target_audience}\nDescription: ${book.description}\n\n`+
    `Review for market-readiness. Respond ONLY JSON:\n`+
    `{"overall_score":85,"title_score":80,"keyword_score":75,"seo_score":85,"differentiation_score":80,`+
    `"verdict":"PASS","verdict_reason":"Summary",`+
    `"strengths":["s1","s2"],"issues":["i1","i2"],`+
    `"title_suggestions":["T1","T2"],"keyword_suggestions":["k1","k2","k3","k4","k5"],`+
    `"seo_rewrite":"Better SEO","subtitle_suggestion":"Better subtitle"}`,0.5
  );
  trackUsage();
  const match=raw.match(/\{[\s\S]*\}/);
  if(!match)throw{code:"PARSE"};
  return JSON.parse(match[0]);
}

function ReviewPanel({book,onSettings}){
  const [review,setReview]=useState(book.review||null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const run=async()=>{if(!getKey()){onSettings();return;}setLoading(true);setError("");try{const r=await runReviewAgent(book);setReview(r);updateBook(book.id,{review:r});}catch(e){setError(errMsg(e));}finally{setLoading(false);}};
  return(
    <div className="max-w-3xl mx-auto space-y-5">
      <Card><div className="flex items-start justify-between gap-4 mb-4"><div><h2 className="text-white text-xl font-bold">🤖 AI Review Agent</h2><p className="text-white/40 text-sm mt-1">Scores title, keywords, SEO & differentiation for market-readiness.</p></div><button onClick={run} disabled={loading} className="bg-purple-500/20 hover:bg-purple-500/30 text-purple-300 border border-purple-500/30 px-4 py-2 rounded-lg text-sm font-medium disabled:opacity-50 whitespace-nowrap">{loading?<><Spin size="h-4 w-4"/> Analyzing</>:"Run Review"}</button></div>{error&&<div className="bg-red-500/20 border border-red-500/30 text-red-300 rounded-lg p-3 text-sm">{error}</div>}{review&&<div className="space-y-4"><div className="grid grid-cols-2 gap-3"><div className="bg-white/5 border border-white/10 rounded-lg p-4"><div className="text-white/50 text-xs uppercase mb-1">Overall</div><div className="text-3xl font-bold text-white">{review.overall_score}</div></div><div className="bg-white/5 border border-white/10 rounded-lg p-4"><div className="text-white/50 text-xs uppercase mb-1">Verdict</div><div className={`text-lg font-bold ${review.verdict==="PASS"?"text-green-400":"text-amber-400"}`}>{review.verdict}</div></div></div><div className="grid grid-cols-2 gap-2"><div className="bg-white/5 border border-white/10 rounded-lg p-3"><p className="text-white/60 text-xs uppercase mb-1">Title</p><p className="text-white font-bold">{review.title_score}</p></div><div className="bg-white/5 border border-white/10 rounded-lg p-3"><p className="text-white/60 text-xs uppercase mb-1">Keywords</p><p className="text-white font-bold">{review.keyword_score}</p></div><div className="bg-white/5 border border-white/10 rounded-lg p-3"><p className="text-white/60 text-xs uppercase mb-1">SEO</p><p className="text-white font-bold">{review.seo_score}</p></div><div className="bg-white/5 border border-white/10 rounded-lg p-3"><p className="text-white/60 text-xs uppercase mb-1">Differentiation</p><p className="text-white font-bold">{review.differentiation_score}</p></div></div>{review.strengths?.length>0&&<div><p className="text-white/60 text-xs uppercase mb-2">✓ Strengths</p><ul className="space-y-1">{review.strengths.map((s,i)=><li key={i} className="text-green-300 text-sm">• {s}</li>)}</ul></div>}{review.issues?.length>0&&<div><p className="text-white/60 text-xs uppercase mb-2">✗ Issues</p><ul className="space-y-1">{review.issues.map((i,idx)=><li key={idx} className="text-amber-300 text-sm">• {i}</li>)}</ul></div>}{review.title_suggestions?.length>0&&<div><p className="text-white/60 text-xs uppercase mb-2">📖 Title Ideas</p><div className="space-y-1">{review.title_suggestions.map((t,i)=><div key={i} className="bg-white/5 border border-white/10 rounded px-3 py-2 text-white/80 text-sm">{t}</div>)}</div></div>}{review.keyword_suggestions?.length>0&&<div><p className="text-white/60 text-xs uppercase mb-2">🔍 Keywords</p><div className="flex flex-wrap gap-2">{review.keyword_suggestions.map((k,i)=><span key={i} className="bg-cyan-500/20 text-cyan-300 text-xs px-2.5 py-1 rounded-full">{k}</span>)}</div></div></div>}</Card>
    </div>
  );
}

// ── Writing Quality Agent ────────────────────────────────────────────────────
const AI_TELLS=["It was a moment","He couldn't help but feel","She found herself","In that moment","Warmth spread","A wave of","His heart raced","He let out a breath","It was clear that","A beat of silence","Without thinking","She couldn't deny","The weight of","As if"];

async function analyzeChapterHumanness(chapterText,bookTitle,genre,chapterTitle){
  const sample=chapterText.length>4000?chapterText.slice(0,1400)+"\n...\n"+chapterText.slice(Math.floor(chapterText.length/2)-700,Math.floor(chapterText.length/2)+700)+"\n...\n"+chapterText.slice(-900):"";
  const localTells=AI_TELLS.filter(t=>chapterText.toLowerCase().includes(t.toLowerCase()));
  const raw=await callGemini(`Literary editor specializing in AI detection.\nBook: "${bookTitle}" (${genre})\nChapter: "${chapterTitle}"\n\nSAMPLE:\n${sample}\n\nDetect AI patterns, score humanness. Respond ONLY JSON:\n{"human_score":85,"verdict":"STRONG","verdict_label":"Reads naturally","ai_tells_found":["Pattern found..."],"issues":["Issue 1"],"feedback":"Detailed feedback"}`,0.4);
  trackUsage();
  const match=raw.match(/\{[\s\S]*\}/);
  if(!match)throw{code:"PARSE"};
  const result=JSON.parse(match[0]);
  if(localTells.length>0){result.ai_tells_found=[...new Set([...(result.ai_tells_found||[]),...localTells.map(t=>`Pattern: "${t}..."`)]);};
  return result;
}

function WritingQualityPanel({book,onSettings}){
  const [chScores,setChScores]=useState(book.writing_quality||{});
  const [loadingCh,setLoadingCh]=useState(null);
  const [error,setError]=useState("");
  const scoreChapter=async(idx)=>{if(!getKey()){onSettings();return;}const ch=book.chapters?.[idx];if(!ch?.content){setError("Write this chapter first.");return;}setLoadingCh(idx);setError("");try{const s=await analyzeChapterHumanness(ch.content,book.title,book.genre,ch.title);const nq={...chScores,[idx]:s};setChScores(nq);updateBook(book.id,{writing_quality:nq});}catch(e){setError(errMsg(e));}finally{setLoadingCh(null);}};
  const hc=s=>s>=80?"text-green-400":s>=65?"text-amber-400":"text-red-400";
  const writtenCount=(book.chapters||[]).filter(c=>c.content).length;
  const scoredCount=Object.keys(chScores).length;
  const avgHuman=scoredCount>0?Math.round(Object.values(chScores).reduce((a,s)=>a+(s.human_score||0),0)/scoredCount):null;
  return(
    <div className="max-w-3xl mx-auto space-y-5">
      <Card>
        <div className="flex items-start justify-between gap-4 mb-2">
          <div><h2 className="text-white text-xl font-bold">✍️ Writing Quality</h2><p className="text-white/40 text-sm mt-1">AI detection & humanness scoring.</p></div>
          {avgHuman!==null&&<div className="text-center shrink-0"><div className={`text-3xl font-bold ${hc(avgHuman)}`}>{avgHuman}</div><div className="text-white/30 text-xs">avg human</div></div>}
        </div>
        {error&&<div className="bg-red-500/20 border border-red-500/30 text-red-300 rounded-xl p-3 mt-3 text-sm">{error}</div>}
      </Card>
      <div className="space-y-3">
        {(book.chapters||[]).map((ch,idx)=>{
          const s=chScores[idx];
          const isLoading=loadingCh===idx;
          return(
            <div key={idx} className={`bg-white/5 border rounded-2xl p-5 ${s?s.human_score>=80?"border-green-500/20":"border-white/10":"border-white/10"}`}>
              <div className="flex items-start justify-between gap-4 mb-3">
                <div><p className="text-white font-semibold text-sm">Ch. {ch.number}: {ch.title}</p>{s&&<p className={`text-xs font-medium mt-0.5 ${hc(s.human_score)}`}>{s.verdict_label||s.verdict}</p>}</div>
                <div className="flex items-center gap-2 shrink-0">
                  {s&&<span className={`text-xl font-bold ${hc(s.human_score)}`}>{s.human_score}</span>}
                  <button onClick={()=>scoreChapter(idx)} disabled={isLoading||!ch.content} className="text-xs bg-purple-500/20 text-purple-300 border border-purple-500/30 px-3 py-1.5 rounded-lg hover:bg-purple-500/30 disabled:opacity-50">{isLoading?<Spin size="h-3 w-3"/>:"Score"}</button>
                </div>
              </div>
              {s&&(<>{s.ai_tells_found?.length>0&&<div className="mb-3"><p className="text-red-300/60 text-xs uppercase mb-2">AI Tells</p><div className="space-y-1">{s.ai_tells_found.slice(0,3).map((t,i)=><p key={i} className="text-red-300/80 text-xs">{t}</p>)}</div></div>}{s.feedback&&<p className="text-white/70 text-xs leading-relaxed">{s.feedback}</p>}</>)}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Chapter Quality Scorer ────────────────────────────────────────────────────
function ChapterQualityPanel({book,onSettings}){
  const [scores,setScores]=useState(book.chapter_scores||{});
  const [loading,setLoading]=useState(null);
  const [error,setError]=useState("");
  const scoreChapter=async(idx)=>{if(!getKey()){onSettings();return;}const ch=book.chapters?.[idx];if(!ch?.content){setError("Write chapter first.");return;}setLoading(idx);setError("");try{const raw=await callGemini(`Book editor. Rate chapter on pacing, tension, prose, character voice & hook.\nChapter: "${ch.title}" (${ch.content.length} words)\n\nRespond ONLY JSON:\n{"overall_score":82,"pacing_score":85,"tension_score":80,"character_voice_score":85,"prose_quality_score":80,"hook_strength_score":75,"one_line_verdict":"Strong setup with good pacing.","notes":"Feedback"}`,0.5);trackUsage();const match=raw.match(/\{[\s\S]*\}/);if(!match)throw{code:"PARSE"};const nq={...scores,[idx]:JSON.parse(match[0])};setScores(nq);updateBook(book.id,{chapter_scores:nq});}catch(e){setError(errMsg(e));}finally{setLoading(null);}};
  const scoreColor=s=>s>=80?"text-green-400":s>=65?"text-amber-400":"text-red-400";
  const weakChapters=(book.chapters||[]).filter((_,i)=>scores[i]&&scores[i].overall_score<70);
  return(
    <div className="space-y-5">
      <Card><h2 className="text-white text-xl font-bold mb-1">📊 Chapter Quality</h2><p className="text-white/40 text-sm mb-4">Pacing, tension, prose & hook strength.</p>{weakChapters.length>0&&<div className="bg-amber-500/10 border border-amber-500/30 text-amber-300 text-xs p-3 rounded-lg mb-4">⚠️ {weakChapters.length} chapter(s) below 70 — consider revisions</div>}</Card>
      <div className="space-y-3">
        {(book.chapters||[]).map((ch,idx)=>{
          const s=scores[idx];
          return(
            <div key={idx} className={`bg-white/5 border rounded-2xl p-5 ${s&&s.overall_score<70?"border-amber-500/30":s?"border-green-500/20":"border-white/10"}`}>
              <div className="flex items-start justify-between gap-4 mb-3">
                <div><p className="text-white font-semibold text-sm">Ch. {ch.number}: {ch.title}</p>{s&&<p className="text-white/40 text-xs mt-0.5 italic">{s.one_line_verdict}</p>}</div>
                <div className="flex items-center gap-2 shrink-0">
                  {s&&<span className={`text-lg font-bold ${scoreColor(s.overall_score)}`}>{s.overall_score}</span>}
                  <button onClick={()=>scoreChapter(idx)} disabled={loading===idx||!ch.content} className="text-xs bg-purple-500/20 text-purple-300 border border-purple-500/30 px-3 py-1.5 rounded-lg hover:bg-purple-500/30 disabled:opacity-50">{loading===idx?<Spin size="h-3 w-3"/>:"Score"}</button>
                </div>
              </div>
              {s&&<><div className="grid grid-cols-5 gap-2 mb-3">{[["Pace","pacing_score"],["Tension","tension_score"],["Voice","character_voice_score"],["Prose","prose_quality_score"],["Hook","hook_strength_score"]].map(([label,key])=><div key={key} className="bg-white/5 border border-white/10 rounded p-2"><p className="text-white/50 text-xs">{label}</p><p className={`text-lg font-bold ${scoreColor(s[key])}`}>{s[key]}</p></div>)}</div>{s.notes&&<p className="text-white/60 text-xs leading-relaxed">{s.notes}</p>}</>) }
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Chapter Editor ─────────────────────────────────────────────────────────
function ChapterEditor({book,onBack}){
  const [chapterIdx,setChapterIdx]=useState(0);
  const [content,setContent]=useState(book.chapters?.[0]?.content||"");
  const ch=book.chapters?.[chapterIdx];
  const save=()=>{if(!ch)return;const chp={...ch,content};const ch_list=[...book.chapters];ch_list[chapterIdx]=chp;updateBook(book.id,{chapters:ch_list});};
  const wordCount=content.trim().split(/\s+/).filter(w=>w).length;
  return(
    <div className="max-w-5xl mx-auto space-y-4">
      <div className="flex gap-2 overflow-x-auto pb-2">
        {book.chapters?.map((c,i)=><button key={i} onClick={()=>{save();setChapterIdx(i);setContent(book.chapters[i]?.content||"");}} className={`px-4 py-2 rounded-lg text-sm whitespace-nowrap ${i===chapterIdx?"bg-purple-500 text-white":"bg-white/5 text-white/60 hover:text-white/80"}`}>Ch. {c.number}</button>)}
      </div>
      <Card>
        <div className="mb-4">
          <h2 className="text-white text-xl font-bold">{ch?.title}</h2>
          <p className="text-white/50 text-xs mt-1">{ch?.description}</p>
        </div>
        <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="Start writing your chapter..." className="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-white h-96 focus:outline-none focus:border-purple-500 resize-none"/>
        <div className="flex items-center justify-between mt-4">
          <span className="text-white/50 text-xs">{wordCount} words</span>
          <button onClick={save} className="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:opacity-90">💾 Save</button>
        </div>
      </Card>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("library");
  const [activeTab,setActiveTab]=useState("library");
  const [editingId,setEditingId]=useState(null);
  const [settingsOpen,setSettingsOpen]=useState(false);

  const navigate=(page,id)=>{setView(page);if(id)setEditingId(id);};

  return(
    <div className="min-h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950">
      {settingsOpen&&<SettingsModal onClose={()=>setSettingsOpen(false)}/>}
      {(view==="library"||view==="main")&&<LibraryPage navigate={navigate} onSettings={()=>setSettingsOpen(true)} activeTab={activeTab} setActiveTab={setActiveTab}/>}
      {view==="editor"&&editingId&&<EditorPage bookId={editingId} onBack={()=>setView("library")} onSettings={()=>setSettingsOpen(true)}/>}
      {view==="chapter-editor"&&editingId&&<ChapterEditorPage bookId={editingId} onBack={()=>setView("library")} onSettings={()=>setSettingsOpen(true)}/>}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// LIBRARY PAGE
// ─────────────────────────────────────────────────────────────────────
function LibraryPage({navigate,onSettings,activeTab,setActiveTab}){
  const [books,setBooks]=useState(getBooks());
  const [showCreate,setShowCreate]=useState(false);
  const [form,setForm]=useState({title:"",genre:"",audience:"",description:""});
  const [loading,setLoading]=useState(false);

  const reload=()=>setBooks(getBooks());

  const createBook=async()=>{
    if(!form.title||!form.genre||!form.audience)return;
    if(!getKey()){onSettings();return;}
    setLoading(true);
    try{
      const raw=await callGemini(`For ${form.genre} book "${form.title}" for ${form.audience}. Generate 8-10 chapter titles. Respond ONLY JSON: {"chapters":[{"number":1,"title":"","description":""}]}`);
      trackUsage();
      const match=raw.match(/\{[\s\S]*\}/);
      if(!match)throw{code:"PARSE"};
      const outline=JSON.parse(match[0]);
      const book={
        id:"book_"+Date.now()+"_"+Math.random().toString(36).slice(2,7),
        title:form.title,subtitle:"",genre:form.genre,target_audience:form.audience,description:form.description,
        chapters:(outline.chapters||[]).map((c,i)=>({...c,number:i+1,content:"",generated:false})),
        status:"outlining",word_count:0,review:null,created_date:new Date().toISOString()
      };
      const newBooks=getBooks();
      newBooks.unshift(book);
      setBooks(newBooks);
      setShowCreate(false);
      setForm({title:"",genre:"",audience:"",description:""});
    }catch(e){alert(errMsg(e));}
    finally{setLoading(false);}
  };

  const deleteBook=(id,e)=>{e.stopPropagation();if(!confirm("Delete?"))return;const updated=getBooks().filter(b=>b.id!==id);setBooks(updated);};

  if(activeTab==="series")return<SeriesPage onSettings={onSettings}/>;
  if(activeTab==="queue")return<QueuePage onSettings={onSettings}/>;

  return(
    <div className="min-h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950">
      <Header title="BookForge AI" subtitle="Outline • Write • Review • Publish" onSettings={onSettings} activeTab={activeTab} setActiveTab={setActiveTab}/>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        <div className="flex justify-between items-center mb-6"><h2 className="text-white text-2xl font-bold">📚 My Books</h2><button onClick={()=>setShowCreate(!showCreate)} className="bg-gradient-to-r from-purple-500 to-pink-500 hover:opacity-90 text-white px-4 py-2 rounded-lg font-medium text-sm transition-all">+ New Book</button></div>
        {showCreate&&(<div className="bg-white/5 border border-purple-500/30 rounded-2xl p-6 mb-8"><h3 className="text-white font-bold text-lg mb-4">Create a New Book</h3><div className="space-y-4"><div><label className="text-white/60 text-sm block mb-1">Title</label><input type="text" placeholder="My Epic Novel" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} className="w-full bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-purple-500"/></div><div><label className="text-white/60 text-sm block mb-1">Genre</label><select value={form.genre} onChange={e=>setForm({...form,genre:e.target.value})} className="w-full bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-purple-500"><option value="">Select genre...</option>{GENRES.map((g,i)=><option key={i} value={g}>{g}</option>)}</select></div><div><label className="text-white/60 text-sm block mb-1">Target Audience</label><select value={form.audience} onChange={e=>setForm({...form,audience:e.target.value})} className="w-full bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-purple-500"><option value="">Select audience...</option>{AUDIENCES.map((a,i)=><option key={i} value={a}>{a}</option>)}</select></div><div><label className="text-white/60 text-sm block mb-1">Description</label><textarea placeholder="Brief book description..." value={form.description} onChange={e=>setForm({...form,description:e.target.value})} className="w-full bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-purple-500 h-20" /></div><button onClick={createBook} disabled={!form.title||!form.genre||!form.audience||loading} className="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold py-2.5 rounded-lg disabled:opacity-50 transition-all">{loading?<><Spin size="h-4 w-4"/> Creating</>:"Create Book"}</button></div></div>)}
        {books.length===0?<div className="text-center py-20"><div className="text-7xl mb-4">📖</div><h2 className="text-white text-xl font-bold mb-2">No books yet</h2><p className="text-white/40">Start creating your first book to see it here.</p></div>:<div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">{books.map(b=><div key={b.id} onClick={()=>navigate("editor",b.id)} className="bg-white/5 border border-white/10 rounded-2xl p-5 hover:border-white/20 cursor-pointer transition-all"><div className="flex items-start justify-between mb-3"><div className="flex-1"><h3 className="text-white font-bold text-sm">{b.title}</h3><p className="text-white/40 text-xs mt-0.5">{b.genre}</p></div><button onClick={(e)=>deleteBook(b.id,e)} className="text-white/30 hover:text-red-400">🗑️</button></div><p className="text-white/50 text-xs mb-3 line-clamp-2">{b.description}</p><div className="flex items-center justify-between"><span className={`text-xs font-medium px-2 py-1 rounded ${STATUS_COLORS[b.status]||STATUS_COLORS.idea}`}>{STATUS_ICONS[b.status]} {b.status}</span><span className="text-white/40 text-xs">{b.chapters?.length||0} ch.</span></div></div>)}</div>}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// SERIES PAGE
// ─────────────────────────────────────────────────────────────────────
function SeriesPage({onSettings}){
  return<div className="min-h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950"><Header title="Series" subtitle="Manage series & related books"/><div className="max-w-7xl mx-auto px-4 sm:px-6 py-8"><Card><h2 className="text-white text-2xl font-bold mb-4">📗 Series Management</h2><p className="text-white/60">Plan and organize multi-book series with shared worlds, characters, and plot arcs.</p><div className="mt-6 p-8 border-2 border-dashed border-white/10 rounded-lg text-center"><p className="text-white/40 text-sm">Series builder coming soon. Link books, manage character continuity, and track series timeline.</p></div></Card></div></div>;
}

// ─────────────────────────────────────────────────────────────────────
// QUEUE PAGE
// ─────────────────────────────────────────────────────────────────────
function QueuePage({onSettings}){
  return<div className="min-h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950"><Header title="Queue" subtitle="Batch processing"/><div className="max-w-7xl mx-auto px-4 sm:px-6 py-8"><Card><h2 className="text-white text-2xl font-bold mb-4">⏳ Processing Queue</h2><p className="text-white/60">Queue chapters for batch AI processing: reviews, quality scores, and hooks.</p><div className="mt-6 p-8 border-2 border-dashed border-white/10 rounded-lg text-center"><p className="text-white/40 text-sm">Queue processor coming soon. Process multiple chapters at once to save API quota.</p></div></Card></div></div>;
}

// ─────────────────────────────────────────────────────────────────────
// CHAPTER EDITOR PAGE
// ─────────────────────────────────────────────────────────────────────
function ChapterEditorPage({bookId,onBack,onSettings}){
  const [book,setBook]=useState(getBook(bookId));
  if(!book)return<div className="text-white text-center py-20">Book not found</div>;
  const refresh=()=>setBook(getBook(bookId));
  return(
    <div className="min-h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950">
      <Header onBack={onBack} title={`${book.title} - Chapter Writer`} subtitle="Write & Save chapters" onSettings={onSettings}/>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        <ChapterEditor book={book} onBack={onBack}/>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// EDITOR PAGE
// ─────────────────────────────────────────────────────────────────────
function EditorPage({bookId,onBack,onSettings}){
  const [book,setBook]=useState(getBook(bookId));
  const [activeTab,setActiveTab]=useState("overview");

  if(!book)return<div className="text-white text-center py-20">Book not found</div>;

  const refresh=()=>setBook(getBook(bookId));

  return(
    <div className="min-h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950">
      <Header onBack={onBack} title={book.title} subtitle={book.genre} onSettings={onSettings}/>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        <div className="flex gap-2 mb-6 overflow-x-auto pb-2">
          {[["overview","📖 Overview"],["outline","📝 Outline"],["review","🤖 Review"],["competitor","🔎 Market"],["hooks","🪝 Hooks"],["quality","✍️ Quality"],["chapters","📊 Chapters"]].map(([id,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)} className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all ${activeTab===id?"bg-purple-500 text-white":"bg-white/5 text-white/60 hover:text-white/80"}`}>{label}</button>
          ))}
        </div>
        {activeTab==="overview"&&<Card><h2 className="text-white text-xl font-bold mb-4">Book Overview</h2><p className="text-white/70 mb-4">{book.description}</p><p className="text-white/50 text-sm">{book.chapters?.length||0} chapters • {book.word_count} words</p><button onClick={()=>window.location.href=`#chapter-editor/${bookId}`} className="mt-4 bg-purple-500/20 hover:bg-purple-500/30 text-purple-300 border border-purple-500/30 px-4 py-2 rounded-lg text-sm">✍️ Write Chapters</button></Card>}
        {activeTab==="outline"&&<div className="space-y-3">{(book.chapters||[]).map((ch,i)=><Card key={i}><p className="text-white font-semibold">Ch. {ch.number}: {ch.title}</p><p className="text-white/50 text-sm mt-2">{ch.description}</p></Card>)}</div>}
        {activeTab==="review"&&<ReviewPanel book={book} onSettings={onSettings}/>}
        {activeTab==="competitor"&&<CompetitorPanel book={book} onSettings={onSettings}/>}
        {activeTab==="hooks"&&<HookPanel book={book} onSettings={onSettings}/>}
        {activeTab==="quality"&&<WritingQualityPanel book={book} onSettings={onSettings}/>}
        {activeTab==="chapters"&&<ChapterQualityPanel book={book} onSettings={onSettings}/>}
      </div>
    </div>
  );
}

// ── Render ─────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
