// EDITOR PAGE
// ══════════════════════════════════════════════════════════════════════════════
function EditorPage({bookId,navigate,onSettings}){
  const [book,setBook]=useState(null);
  const [tab,setTab]=useState(0);
  const [busy,setBusy]=useState(false);
  const [busyCh,setBusyCh]=useState(null);
  const [error,setError]=useState("");
  const [success,setSuccess]=useState("");
  const [selCh,setSelCh]=useState(0);
  const [quotaHit,setQuotaHit]=useState(false);
  const [buildLog,setBuildLog]=useState([]);
  const [isBuilding,setIsBuilding]=useState(false);
  const [coverMode,setCoverMode]=useState("auto");
  const [customPrompt,setCustomPrompt]=useState("");
  const [lastAiPrompt,setLastAiPrompt]=useState("");
  const buildRef=useRef(false);
  const TABS=["📋 Outline","✍️ Chapters","🎨 Cover","🔍 SEO","🤖 Review","📤 Publish"];

  useEffect(()=>{
    const b=getBook(bookId);
    if(!b){navigate("home");return;}
    setBook(b);
    if(getUsage()>=DAILY_LIMIT)setQuotaHit(true);
    if(b.auto_build&&!buildRef.current){buildRef.current=true;runAutoBuild(b);}
  },[bookId]);

  const reload=()=>{const b=getBook(bookId);if(b)setBook(b);return b;};
  const upd=(updates)=>{const b=updateBook(bookId,updates);if(b)setBook(b);return b;};
  const bump=()=>{const c=trackUsage();if(c>=DAILY_LIMIT)setQuotaHit(true);return c;};
  const flash=msg=>{setSuccess(msg);setTimeout(()=>setSuccess(""),4000);};
  const handleErr=e=>{setError(errMsg(e));if(e?.code==="QUOTA")setQuotaHit(true);};
  const log=msg=>{setBuildLog(prev=>[...prev,msg]);updateBook(bookId,{build_step:msg});};

  // ── Series book outline generation ────────────────────────────────────────
  const generateSeriesOutline=async(b)=>{
    if(!b.book_plan)return null;
    const bp=b.book_plan;
    const series=getSeriesById(b.series_id);
    const seriesBibleCtx=series?buildSeriesContext(series):"";
    log(`📋 Generating outline for Book ${bp.number}: "${bp.title}"…`);
    const raw=await callGemini(
      `You are a master series author. Generate a detailed chapter outline for Book ${bp.number} of the "${b.series_name}" series.\n\n`+
      `BOOK DETAILS:\n`+
      `Title: "${bp.title}"${bp.subtitle?" — "+bp.subtitle:""}\n`+
      `Description: ${bp.description}\nMain Conflict: ${bp.main_conflict||""}\nHook: ${bp.hook||""}\n`+
      `Character Focus: ${bp.character_focus||""}\nHow it connects: ${bp.how_it_connects||""}\n`+
      `Genre: ${b.genre}\nAudience: ${b.target_audience}\n\n`+
      (seriesBibleCtx?`${seriesBibleCtx}\n`:"")+ 
      `Generate 10-15 chapters. Each chapter must advance the main romance/plot AND weave in series-world details consistently.\n\n`+
      `Respond ONLY with valid JSON (no markdown):\n`+
      `{"title":"${bp.title}","subtitle":"${bp.subtitle||""}","description":"","themes":[""],"estimated_word_count":55000,`+
      `"key_characters":["character names featured in this book"],`+
      `"key_locations":["location names featured in this book"],`+
      `"key_plot_events":["major event 1 (for series bible)","major event 2"],`+
      `"chapters":[{"number":1,"title":"","description":"detailed 2-3 sentence description including which characters appear and what happens"}]}`
    );
    bump();
    const match=raw.match(/\{[\s\S]*\}/);
    if(!match)throw{code:"PARSE",msg:"Couldn't parse series outline."};
    const outline=JSON.parse(match[0]);
    const chapters=(outline.chapters||[]).map(c=>({...c,content:"",generated:false}));
    updateBook(bookId,{outline:JSON.stringify(outline),chapters,needs_outline:false,status:"writing"});
    return{outline,chapters};
  };

  // ── Auto-build pipeline ───────────────────────────────────────────────────
  const runAutoBuild=async(b)=>{
    if(getUsage()>=DAILY_LIMIT){setQuotaHit(true);upd({auto_build:false});return;}
    setIsBuilding(true);setTab(0);
    try{
      let chapters=b.chapters||[];
      let outline=b.outline?JSON.parse(b.outline):{};

      // If series book needing outline, generate it first
      if(b.needs_outline&&b.book_plan){
        const result=await generateSeriesOutline(b);
        if(result){outline=result.outline;chapters=result.chapters;}
        else{upd({auto_build:false,build_step:""});setIsBuilding(false);return;}
      }

      const total=chapters.length;
      // Write all chapters
      for(let i=0;i<total;i++){
        if(!buildRef.current)break;
        if(getUsage()>=DAILY_LIMIT){setQuotaHit(true);break;}
        log(`✍️ Writing chapter ${i+1} of ${total}: "${chapters[i].title}"…`);
        setTab(1);setSelCh(i);
        try{
          const prev=chapters.slice(0,i).filter(c=>c.generated).map(c=>c.title).join(", ")||"None yet";
          const series=b.series_id?getSeriesById(b.series_id):null;
          const seriesBibleCtx=series?buildSeriesContext(series):"";
          const seriesCtx=b.series_name
            ?`\n\nSERIES CONTEXT — This is Book ${b.series_number} of the "${b.series_name}" series.\n${seriesBibleCtx}\nIMPORTANT: All character descriptions, locations, and established facts from the series bible above MUST remain consistent. Do not contradict anything established in previous books.`
            :"";
          const content=await callGemini(
            `Write Chapter ${chapters[i].number}: "${chapters[i].title}" for a ${b.genre} book titled "${outline.title}".${seriesCtx}\n\n`+
            `Chapter description: ${chapters[i].description}\nPrevious chapters written: ${prev}\nAudience: ${b.target_audience}\n\n`+
            `Write 2,500–3,500 words. Use headings where appropriate. Match genre tone precisely.\n`+
            `For romance/LGBT+ genres: write with authenticity, emotion, and genuine representation. Publication-ready quality.\n`+
            `Weave in world-building details naturally — reference established locations, character traits, and lore without info-dumping.`
          );
          bump();
          chapters[i]={...chapters[i],content,generated:true};
          const wc=chapters.reduce((a,c)=>a+(c.content?c.content.split(/\s+/).length:0),0);
          updateBook(bookId,{chapters:[...chapters],word_count:wc});
          setBook(getBook(bookId));
        }catch(e){if(e?.code==="QUOTA"){setQuotaHit(true);break;}log(`⚠️ Chapter ${i+1} skipped: ${e?.msg||"error"}`);}
      }

      if(getUsage()>=DAILY_LIMIT){upd({auto_build:false,build_step:""});setIsBuilding(false);return;}

      // SEO
      log("🔍 Generating SEO metadata…");setTab(3);
      try{
        const raw=await callGemini(
          `Amazon KDP SEO expert. Optimized metadata for:\nTitle: ${outline.title}\nGenre: ${b.genre}\nDesc: ${outline.description}\n\n`+
          `Respond ONLY with valid JSON:\n{"seo_title":"","seo_description":"","primary_keywords":[""],"bisac_categories":[""],"back_cover_copy":"","author_bio_template":""}`
        );
        bump();
        const match=raw.match(/\{[\s\S]*\}/);
        if(match){const seo=JSON.parse(match[0]);updateBook(bookId,{seo_title:seo.seo_title||"",seo_description:seo.seo_description||"",seo_keywords:(seo.primary_keywords||[]).join(", "),notes:JSON.stringify(seo)});setBook(getBook(bookId));}
      }catch(e){if(e?.code==="QUOTA"){setQuotaHit(true);upd({auto_build:false,build_step:""});setIsBuilding(false);return;}}

      if(getUsage()>=DAILY_LIMIT){upd({auto_build:false,build_step:""});setIsBuilding(false);return;}

      // Cover
      log("🎨 Generating cover image…");setTab(2);
      try{
        const aiPrompt=await callGemini(
          `Detailed image generation prompt for a professional book cover.\nBook: "${outline.title}"\nGenre: ${b.genre}\nDesc: ${outline.description}\n\n`+
          `- Describe specific characters (gender, age, appearance, ethnicity)\n- For gay/LGBT+ romance: two male characters, emotional interaction\n`+
          `- Setting, mood, lighting, palette, art style\n- NO text or words in image\n- Commercial book cover quality\nReturn ONLY the prompt.`
        );
        bump();
        const finalPrompt=aiPrompt.trim()+". No text, no words, no letters.";
        setLastAiPrompt(finalPrompt);
        const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=832&height=1216&model=flux&nologo=true&enhance=true&seed=${Date.now()}`;
        updateBook(bookId,{cover_image_url:url});setBook(getBook(bookId));
      }catch(e){if(e?.code==="QUOTA"){setQuotaHit(true);upd({auto_build:false,build_step:""});setIsBuilding(false);return;}}

      if(getUsage()>=DAILY_LIMIT){upd({auto_build:false,build_step:""});setIsBuilding(false);return;}

      // Review Agent
      log("🤖 Running Review Agent…");setTab(4);
      try{
        const freshBook=getBook(bookId);
        const review=await runReviewAgent(freshBook);
        updateBook(bookId,{review,status:review.verdict==="PASS"?"ready":"writing",auto_build:false,build_step:""});
        setBook(getBook(bookId));
        log(review.verdict==="PASS"?`✅ Review passed! Score: ${review.overall_score}/100`:`⚠️ Review scored ${review.overall_score}/100 — check Review tab for improvements.`);
        flash(review.verdict==="PASS"?"🎉 Book complete and approved! Ready to publish.":"📋 Build complete. Review tab has suggestions to improve your score.");
      }catch(e){upd({auto_build:false,build_step:""});}

    }catch(e){handleErr(e);upd({auto_build:false,build_step:""});}
    finally{setIsBuilding(false);buildRef.current=false;}
  };

  // ── Manual ops ────────────────────────────────────────────────────────────
  const genChapter=async(idx)=>{
    if(quotaHit||isBuilding)return;setBusyCh(idx);setError("");
    try{
      const outline=JSON.parse(book.outline||"{}");
      const ch=outline.chapters[idx];
      const prev=(book.chapters||[]).slice(0,idx).filter(c=>c.generated).map(c=>c.title).join(", ")||"None yet";
      const series=book.series_id?getSeriesById(book.series_id):null;
      const seriesBibleCtx=series?buildSeriesContext(series):"";
      const seriesCtx=book.series_name
        ?`\n\nSERIES CONTEXT — Book ${book.series_number} of "${book.series_name}".\n${seriesBibleCtx}\nMaintain full consistency with all established facts.`
        :"";
      const content=await callGemini(
        `Write Chapter ${ch.number}: "${ch.title}" for a ${book.genre} book titled "${outline.title}".${seriesCtx}\n\n`+
        `Chapter description: ${ch.description}\nPrevious chapters: ${prev}\nAudience: ${book.target_audience}\n\n`+
        `2,500–3,500 words. Match genre tone precisely. For romance/LGBT+: authentic emotion and representation.\n`+
        `Weave in world-building and series continuity naturally.`
      );
      bump();
      const chapters=[...(book.chapters||[])];chapters[idx]={...chapters[idx],content,generated:true};
      const wc=chapters.reduce((a,c)=>a+(c.content?c.content.split(/\s+/).length:0),0);
      upd({chapters,word_count:wc,status:"writing"});flash(`Chapter ${idx+1} written! ✍️`);
    }catch(e){handleErr(e);}finally{setBusyCh(null);}
  };

  const genSEO=async()=>{
    if(quotaHit||isBuilding)return;setBusy(true);setError("");
    try{
      const outline=JSON.parse(book.outline||"{}");
      const raw=await callGemini(`Amazon KDP SEO expert.\nTitle: ${outline.title}\nGenre: ${book.genre}\nDesc: ${outline.description}\n\nRespond ONLY with valid JSON:\n{"seo_title":"","seo_description":"","primary_keywords":[""],"bisac_categories":[""],"back_cover_copy":"","author_bio_template":""}`);
      bump();const match=raw.match(/\{[\s\S]*\}/);if(!match)throw{code:"PARSE",msg:"Couldn't parse SEO."};
      const seo=JSON.parse(match[0]);
      upd({seo_title:seo.seo_title||"",seo_description:seo.seo_description||"",seo_keywords:(seo.primary_keywords||[]).join(", "),notes:JSON.stringify(seo)});
      flash("SEO generated! 🔍");
    }catch(e){handleErr(e);}finally{setBusy(false);}
  };

  const genCover=async()=>{
    if(quotaHit||isBuilding)return;setBusy(true);setError("");
    try{
      let finalPrompt="";
      if(coverMode==="custom"&&customPrompt.trim()){finalPrompt=customPrompt.trim()+". Professional book cover, no text, no letters.";}
      else{
        const outline=JSON.parse(book.outline||"{}");
        const aiPrompt=await callGemini(`Detailed image generation prompt for a professional book cover.\nBook: "${outline.title}"\nGenre: ${book.genre}\nDesc: ${outline.description}\n\n- Describe specific characters (gender, age, look)\n- For gay/LGBT+ romance: two male characters, emotional interaction\n- Setting, mood, lighting, palette, art style\n- NO text or words\n- Commercial quality\nReturn ONLY the prompt.`);
        bump();finalPrompt=aiPrompt.trim()+". No text, no words, no letters.";setLastAiPrompt(finalPrompt);
      }
      const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=832&height=1216&model=flux&nologo=true&enhance=true&seed=${Date.now()}`;
      upd({cover_image_url:url});flash("Cover generated! 🎨");
    }catch(e){handleErr(e);}finally{setBusy(false);}
  };

  const newVariation=()=>{if(!book?.cover_image_url)return;try{const u=new URL(book.cover_image_url);u.searchParams.set("seed",Date.now().toString());upd({cover_image_url:u.toString()});flash("New variation! 🎨");}catch{}};

  const download=()=>{
    // Gate: must have a passing review
    if(!book.review){setError("Run the Review Agent first (Review tab) before downloading.");setTab(4);return;}
    if(book.review.verdict!=="PASS"){setError(`Review score is ${book.review.overall_score}/100 — needs 70+ to pass. Check the Review tab for improvements.`);setTab(4);return;}
    if(!book.chapters?.some(c=>c.content)){setError("Write at least one chapter first.");return;}
    const md=`# ${book.title}\n${book.subtitle?`## ${book.subtitle}\n`:""}\n${book.description||""}\n\n---\n\n`+
      (book.chapters||[]).map(c=>`# Chapter ${c.number}: ${c.title}\n\n${c.content||"(Not yet generated)"}`).join("\n\n---\n\n");
    const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([md],{type:"text/markdown"})),download:`${(book.title||"book").replace(/[^a-z0-9]/gi,"_")}.md`});
    a.click();
  };

  if(!book)return<div className="text-white/40 text-center py-20">Loading…</div>;
  const reviewPassed=book.review?.verdict==="PASS";
  const reviewScore=book.review?.overall_score;

  return(
    <div>
      <div className="border-b border-white/10 bg-black/10">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex gap-1 overflow-x-auto">
          {TABS.map((t,i)=>(
            <button key={i} onClick={()=>setTab(i)}
              className={`px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-t-lg transition-all relative ${tab===i?"bg-white/10 text-white border-b-2 border-purple-500":"text-white/35 hover:text-white/70"}`}>
              {t}
              {i===4&&book.review&&<span className={`ml-1.5 text-xs font-bold ${reviewPassed?"text-green-400":"text-red-400"}`}>{reviewScore}</span>}
            </button>
          ))}
        </div>
      </div>

      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        {isBuilding&&(
          <div className="bg-purple-500/15 border border-purple-500/40 rounded-xl p-5 mb-5">
            <div className="flex items-center gap-3 mb-3"><Spin/><p className="text-purple-300 font-semibold">Auto-building your book…</p></div>
            <div className="h-1.5 bg-white/10 rounded-full overflow-hidden mb-3">
              <div className="h-full bg-gradient-to-r from-purple-500 to-pink-500 rounded-full pulse" style={{width:`${Math.min(((book.chapters||[]).filter(c=>c.generated).length/Math.max((book.chapters||[{a:1}]).length,1))*80+5,95)}%`}}/>
            </div>
            <div className="space-y-1 max-h-24 overflow-y-auto">{buildLog.slice(-5).map((l,i)=><p key={i} className="text-purple-200/50 text-xs">{l}</p>)}</div>
          </div>
        )}
        {quotaHit&&(
          <div className="bg-amber-500/20 border border-amber-500/40 rounded-xl p-4 mb-5 flex gap-3 items-start">
            <span className="text-2xl">⏳</span>
            <div className="flex-1"><p className="text-amber-300 font-semibold">Daily Gemini Limit Reached</p><p className="text-amber-200/60 text-sm mt-0.5">Resets at midnight Pacific Time. All progress saved!</p></div>
            <button onClick={()=>{setQuotaHit(false);setError("");}} className="text-amber-400/40 hover:text-amber-300">✕</button>
          </div>
        )}
        {error&&!quotaHit&&(
          <div className="bg-red-500/20 border border-red-500/30 text-red-300 rounded-xl p-4 mb-5 text-sm flex justify-between">
            <span>{error}</span><button onClick={()=>setError("")} className="ml-4 shrink-0">✕</button>
          </div>
        )}
        {success&&<div className="bg-green-500/20 border border-green-500/30 text-green-300 rounded-xl p-4 mb-5 text-sm">{success}</div>}

        {/* OUTLINE */}
        {tab===0&&(
          <div className="max-w-3xl mx-auto">
            <div className="bg-white/5 border border-white/10 rounded-2xl p-6 sm:p-8">
              {book.series_name&&<div className="flex items-center gap-2 mb-3"><span className="bg-cyan-500/20 text-cyan-300 text-xs px-3 py-1 rounded-full border border-cyan-500/30">📗 {book.series_name} — Book {book.series_number}</span></div>}
              <h2 className="text-white text-xl font-bold">{book.title}</h2>
              {book.subtitle&&<p className="text-purple-300 mt-1 mb-4 text-sm">{book.subtitle}</p>}
              <p className="text-white/60 text-sm leading-relaxed mb-6">{book.description}</p>
              {book.chapters?.length>0&&<>
                <p className="text-white/40 text-xs uppercase tracking-wider mb-3">Chapters ({book.chapters.length})</p>
                <div className="space-y-2">
                  {book.chapters.map((ch,i)=>(
                    <div key={i} className={`rounded-xl p-3 border flex gap-3 items-start ${ch.generated?"bg-green-500/10 border-green-500/20":"bg-white/5 border-white/10"}`}>
                      <span className={`font-bold text-sm min-w-[24px] ${ch.generated?"text-green-400":"text-purple-400"}`}>{ch.generated?"✓":ch.number+"."}</span>
                      <div className="flex-1"><p className="text-white text-sm font-medium">{ch.title}</p><p className="text-white/35 text-xs mt-0.5">{ch.description}</p></div>
                      {ch.generated&&<span className="text-green-400/50 text-xs shrink-0">Written</span>}
                    </div>
                  ))}
                </div>
                <div className="mt-5 bg-white/5 rounded-xl p-4">
                  <div className="flex justify-between text-xs text-white/40 mb-2"><span>Progress</span><span>{book.chapters.filter(c=>c.generated).length}/{book.chapters.length} chapters</span></div>
                  <div className="h-2 bg-white/10 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-purple-500 to-pink-500 rounded-full transition-all" style={{width:`${(book.chapters.filter(c=>c.generated).length/book.chapters.length)*100}%`}}/></div>
                </div>
              </>}
              {(!book.chapters||book.chapters.length===0)&&isBuilding&&<div className="text-center py-8 text-white/30"><Spin/><p className="mt-3 text-sm">Generating outline…</p></div>}
            </div>
          </div>
        )}

        {/* CHAPTERS */}
        {tab===1&&(
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
            <div className="lg:col-span-1">
              <div className="bg-white/5 border border-white/10 rounded-2xl p-4 sticky top-24">
                <div className="flex items-center justify-between mb-3">
                  <h3 className="text-white font-semibold text-sm">Chapters</h3>
                  {!isBuilding&&<button onClick={async()=>{const pending=(book.chapters||[]).map((c,i)=>i).filter(i=>!book.chapters[i].generated);for(const i of pending){if(quotaHit)break;await genChapter(i);}}} disabled={busy||busyCh!==null||quotaHit||isBuilding} className="text-xs bg-purple-500/20 text-purple-300 border border-purple-500/30 px-3 py-1.5 rounded-lg hover:bg-purple-500/30 disabled:opacity-40">Write All</button>}
                </div>
                <div className="space-y-1">
                  {(book.chapters||[]).map((ch,i)=>(
                    <button key={i} onClick={()=>setSelCh(i)} className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-all ${selCh===i?"bg-purple-500/20 text-white border border-purple-500/30":"text-white/50 hover:bg-white/5"}`}>
                      <span className={ch.generated?"text-green-400":""}>{ch.generated?"✓ ":""}</span>{ch.number}. {ch.title}
                    </button>
                  ))}
                </div>
              </div>
            </div>
            <div className="lg:col-span-2">
              {book.chapters?.[selCh]&&(
                <div className="bg-white/5 border border-white/10 rounded-2xl p-6 sm:p-8">
                  <div className="flex items-start justify-between mb-5 gap-4">
                    <div><h2 className="text-white text-lg font-bold">Ch. {book.chapters[selCh].number}: {book.chapters[selCh].title}</h2><p className="text-white/35 text-sm mt-1">{book.chapters[selCh].description}</p></div>
                    {!isBuilding&&<button onClick={()=>genChapter(selCh)} disabled={busyCh!==null||quotaHit||isBuilding} className="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-4 py-2 rounded-xl font-medium text-sm hover:opacity-90 disabled:opacity-50 flex items-center gap-2 shrink-0">
                      {busyCh===selCh?<><Spin size="h-4 w-4"/>Writing…</>:book.chapters[selCh].generated?"✍️ Rewrite":"✍️ Write"}
                    </button>}
                  </div>
                  {book.chapters[selCh].content?<div className="text-white/75 text-sm leading-relaxed whitespace-pre-wrap max-h-[600px] overflow-y-auto pr-2">{book.chapters[selCh].content}</div>
                    :<div className="text-center py-16 text-white/25"><div className="text-4xl mb-3">✍️</div><p>{isBuilding?"Generating…":"Click Write to generate this chapter"}</p></div>}
                </div>
              )}
            </div>
          </div>
        )}

        {/* COVER */}
        {tab===2&&(
          <div className="max-w-5xl mx-auto">
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
              <div>
                <h2 className="text-white text-xl font-bold mb-4">Cover Preview</h2>
                {book.cover_image_url?<><img src={book.cover_image_url} alt="Cover" className="w-full max-w-xs rounded-2xl shadow-2xl shadow-purple-900/60 mx-auto block"/>
                  <div className="flex gap-2 mt-4 justify-center">
                    <button onClick={newVariation} disabled={busy||isBuilding} className="text-sm border border-white/20 text-white/50 px-4 py-2 rounded-lg hover:bg-white/5 disabled:opacity-40">🎲 Variation</button>
                    <a href={book.cover_image_url} target="_blank" rel="noopener noreferrer" className="text-sm border border-white/20 text-white/50 px-4 py-2 rounded-lg hover:bg-white/5">⬇️ Download Image</a>
                  </div></>
                :<div className="w-full max-w-xs aspect-[2/3] bg-white/5 border-2 border-dashed border-white/15 rounded-2xl flex items-center justify-center mx-auto">
                  <div className="text-center text-white/20">{isBuilding?<><Spin/><p className="text-sm mt-2">Generating…</p></>:<><div className="text-5xl mb-2">🎨</div><p className="text-sm">Cover appears here</p></>}</div>
                </div>}
              </div>
              <div className="space-y-5">
                <h2 className="text-white text-xl font-bold">Cover Settings</h2>
                <div className="bg-white/5 border border-white/10 rounded-xl p-1 flex gap-1">
                  {[["auto","✨ AI Auto"],["custom","✏️ Custom"]].map(([m,label])=>(
                    <button key={m} onClick={()=>setCoverMode(m)} className={`flex-1 py-2 rounded-lg text-sm font-medium transition-all ${coverMode===m?"bg-purple-500 text-white":"text-white/40 hover:text-white"}`}>{label}</button>
                  ))}
                </div>
                {coverMode==="auto"?<div className="bg-white/5 border border-white/10 rounded-xl p-4 text-sm text-white/50">Gemini analyzes your book and writes a detailed, character-specific prompt automatically.{lastAiPrompt&&<p className="text-white/25 text-xs mt-3 italic leading-relaxed">{lastAiPrompt}</p>}</div>
                :<div><label className="text-white/60 text-sm font-medium block mb-2">Describe your cover</label>
                  <textarea rows={7} value={customPrompt} onChange={e=>setCustomPrompt(e.target.value)}
                    placeholder="E.g. Two men in their 20s, one with dark curly hair and one with red hair, standing close on a rainy rooftop at dusk, golden light, painterly cinematic style, jewel-tone colors, no text..."
                    className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/20 focus:outline-none focus:border-purple-500 resize-none text-sm"/></div>}
                <button onClick={genCover} disabled={busy||quotaHit||isBuilding||(coverMode==="custom"&&!customPrompt.trim())}
                  className="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-4 rounded-xl font-semibold text-lg hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                  {busy?<><Spin/>Generating…</>:book.cover_image_url?"🔄 Regenerate":"🎨 Generate Cover"}
                </button>
              </div>
            </div>
          </div>
        )}

        {/* SEO */}
        {tab===3&&(
          <div className="max-w-3xl mx-auto">
            <div className="bg-white/5 border border-white/10 rounded-2xl p-6 sm:p-8">
              <div className="flex items-center justify-between mb-6">
                <div><h2 className="text-white text-xl font-bold">SEO Optimization</h2><p className="text-white/40 text-sm mt-1">Amazon KDP & publishing metadata</p></div>
                {!isBuilding&&<button onClick={genSEO} disabled={busy||quotaHit||isBuilding} className="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-5 py-2.5 rounded-xl font-semibold hover:opacity-90 disabled:opacity-50 flex items-center gap-2">
                  {busy?<><Spin size="h-4 w-4"/>Generating…</>:"🔍 Generate SEO"}
                </button>}
              </div>
              <div className="space-y-5">
                {[{label:"SEO Title",val:book.seo_title},{label:"SEO Description",val:book.seo_description,large:true},{label:"Keywords",val:book.seo_keywords}].map(f=>(
                  <div key={f.label}><p className="text-white/40 text-xs uppercase tracking-wider mb-2">{f.label}</p>
                    {f.val?<div className={`bg-white/10 rounded-xl p-4 text-white/80 text-sm ${f.large?"leading-relaxed":""}`}>{f.val}</div>
                      :<div className="bg-white/5 border border-dashed border-white/10 rounded-xl p-4 text-white/20 text-sm italic">{isBuilding?"Generating…":"Will be populated automatically"}</div>}
                  </div>
                ))}
                {book.notes&&(()=>{try{const n=JSON.parse(book.notes);return n.back_cover_copy?(<div><p className="text-white/40 text-xs uppercase tracking-wider mb-2">Back Cover Copy</p><div className="bg-white/10 rounded-xl p-4 text-white/80 text-sm leading-relaxed">{n.back_cover_copy}</div></div>):null;}catch{return null;}})()}
              </div>
            </div>
          </div>
        )}

        {/* REVIEW */}
        {tab===4&&(
          <ReviewPanel book={book} onSettings={onSettings}
            onApply={(updates)=>{upd(updates);flash("Applied! Re-run the review to update your score.");}}/>
        )}

        {/* PUBLISH */}
        {tab===5&&(
          <div className="max-w-3xl mx-auto space-y-5">
            {/* Review gate */}
            {!book.review?(
              <div className="bg-amber-500/15 border border-amber-500/40 rounded-2xl p-6 text-center">
                <div className="text-4xl mb-3">🤖</div>
                <h3 className="text-amber-300 font-bold text-lg mb-2">Review Required Before Publishing</h3>
                <p className="text-amber-200/60 text-sm mb-5">The Review Agent must approve your book (score 70+) before you can download or publish.</p>
                <button onClick={()=>setTab(4)} className="bg-gradient-to-r from-amber-500 to-orange-500 text-black font-bold px-8 py-3 rounded-xl hover:opacity-90">Go to Review Agent →</button>
              </div>
            ):!reviewPassed?(
              <div className="bg-red-500/15 border border-red-500/40 rounded-2xl p-6 text-center">
                <div className="text-4xl mb-3">❌</div>
                <h3 className="text-red-300 font-bold text-lg mb-2">Review Score Too Low ({reviewScore}/100)</h3>
                <p className="text-red-200/60 text-sm mb-5">Your book needs a score of 70+ to unlock publishing. Apply the suggested improvements in the Review tab.</p>
                <button onClick={()=>setTab(4)} className="bg-gradient-to-r from-red-500 to-pink-500 text-white font-bold px-8 py-3 rounded-xl hover:opacity-90">View Review Suggestions →</button>
              </div>
            ):(
              <div className="bg-green-500/10 border border-green-500/30 rounded-2xl p-5 flex items-center gap-4">
                <span className="text-3xl">✅</span>
                <div><p className="text-green-300 font-bold">Review Passed — Score: {reviewScore}/100</p><p className="text-green-200/50 text-sm">Your book is approved for publishing.</p></div>
              </div>
            )}

            {reviewPassed&&(
              <div className="bg-white/5 border border-white/10 rounded-2xl p-6 sm:p-8">
                <h2 className="text-white text-xl font-bold mb-2">Publish Your Book</h2>
                <p className="text-white/40 mb-6 text-sm">Export and upload to your publishing platform</p>
                <div className="space-y-3 mb-8">
                  {[{label:"Outline created",done:!!book.outline},{label:"Chapters written",done:book.chapters?.some(c=>c.generated)},{label:"Cover generated",done:!!book.cover_image_url},{label:"SEO metadata ready",done:!!book.seo_title},{label:"Review Agent passed",done:reviewPassed}].map((item,i)=>(
                    <div key={i} className={`flex items-center gap-3 px-4 py-3 rounded-lg ${item.done?"bg-green-500/10":"bg-white/5"}`}>
                      <span>{item.done?"✅":"⭕"}</span>
                      <span className={`text-sm ${item.done?"text-white":"text-white/35"}`}>{item.label}</span>
                    </div>
                  ))}
                </div>
                <button onClick={download} className="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-4 rounded-xl font-semibold text-lg hover:opacity-90 flex items-center justify-center gap-2">
                  📥 Download as Markdown (.md)
                </button>
                <p className="text-white/25 text-xs text-center mt-3">Upload the .md file to Amazon KDP, Smashwords, or Draft2Digital</p>
              </div>
            )}

            <div className="grid grid-cols-3 gap-4">
              {[{name:"Amazon KDP",url:"https://kdp.amazon.com",icon:"📦",color:"border-orange-500/30 bg-orange-500/10"},{name:"Smashwords",url:"https://www.smashwords.com",icon:"📚",color:"border-blue-500/30 bg-blue-500/10"},{name:"Draft2Digital",url:"https://draft2digital.com",icon:"🌐",color:"border-green-500/30 bg-green-500/10"}].map(p=>(
                <a key={p.name} href={p.url} target="_blank" rel="noopener noreferrer" className={`border ${p.color} rounded-xl p-4 text-center hover:opacity-80 transition-opacity`}>
                  <div className="text-2xl mb-2">{p.icon}</div><p className="text-white font-semibold text-sm">{p.name}</p><p className="text-white/30 text-xs mt-1">Open →</p>
                </a>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App Shell ─────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("home");
  const [bookId,setBookId]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [homeTab,setHomeTab]=useState("library");

  const navigate=(p,id=null)=>{setPage(p);if(id)setBookId(id);window.scrollTo(0,0);};
  const currentBook=bookId?getBook(bookId):null;
  const isHome=page==="home";
  const isEditor=page==="editor";
  const isCreate=page==="create";

  return(
    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
      {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)}/>}
      <Header
        onBack={!isHome?()=>navigate("home"):null}
        title={isEditor&&currentBook?currentBook.title:"BookForge AI"}
        subtitle={isEditor&&currentBook?`${currentBook.genre} · ${currentBook.target_audience}`:"AI-Powered Book Generator"}
        onSettings={()=>setShowSettings(true)}
        activeTab={isHome?homeTab:null}
        setActiveTab={isHome?(t)=>setHomeTab(t):null}
      />
      {isHome&&homeTab==="library"&&<HomePage navigate={navigate} onSettings={()=>setShowSettings(true)}/>}
      {isHome&&homeTab==="series"&&<SeriesPage navigate={navigate} onSettings={()=>setShowSettings(true)}/>}
      {isCreate&&<CreatePage navigate={navigate} onSettings={()=>setShowSettings(true)}/>}
      {isEditor&&<EditorPage bookId={bookId} navigate={navigate} onSettings={()=>setShowSettings(true)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
