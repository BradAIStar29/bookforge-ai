<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BookForge AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{margin:0;font-family:system-ui,sans-serif;background:#0f0a1e}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:rgba(255,255,255,.05)}::-webkit-scrollbar-thumb{background:rgba(139,92,246,.4);border-radius:3px}
.spin{animation:spin 1s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.pulse{animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── Constants ─────────────────────────────────────────────────────────────────
const GEMINI_URL="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent";
const DAILY_LIMIT=1500;
const GENRES=["Fiction - Romance","Fiction - Gay Romance","Fiction - LGBT+","Fiction - Thriller","Fiction - Fantasy","Fiction - Sci-Fi","Fiction - Mystery","Fiction - Horror","Self-Help","Business & Finance","Health & Wellness","Personal Development","Biography & Memoir","History","True Crime","Cookbook","Travel","Spirituality","Science","Technology","Parenting","Education"];
const AUDIENCES=["General Adults","Young Adults (18-25)","LGBT+ Readers","Women","Men","Professionals & Entrepreneurs","Parents","Students","Seniors","Beginners","Advanced Readers"];
const STATUS_COLORS={idea:"bg-gray-500/20 text-gray-300",outlining:"bg-blue-500/20 text-blue-300",writing:"bg-yellow-500/20 text-yellow-300",ready:"bg-green-500/20 text-green-300",published:"bg-purple-500/20 text-purple-300",series:"bg-cyan-500/20 text-cyan-300"};
const STATUS_ICONS={idea:"💡",outlining:"📋",writing:"✍️",ready:"✅",published:"🚀",series:"📗"};

// ── Storage ───────────────────────────────────────────────────────────────────
const ls={get:(k,d)=>{try{const v=localStorage.getItem(k);return v===null?d:JSON.parse(v)}catch{return d}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};
const getKey=()=>localStorage.getItem("gemini_api_key")||"";
const setKey=k=>localStorage.setItem("gemini_api_key",k.trim());
const getBooks=()=>ls.get("bfai_books",[]);
const setBooks=b=>ls.set("bfai_books",b);
const getBook=id=>getBooks().find(b=>b.id===id)||null;
const getSeries=()=>ls.get("bfai_series",[]);
const setSeries=s=>ls.set("bfai_series",s);
const getSeriesById=id=>getSeries().find(s=>s.id===id)||null;
const updateBook=(id,upd)=>{const books=getBooks();const i=books.findIndex(b=>b.id===id);if(i===-1)return null;books[i]={...books[i],...upd};setBooks(books);return books[i];};
const getUsage=()=>{const today=new Date().toISOString().split("T")[0];const d=ls.get("bfai_usage",{});return d.date===today?(d.count||0):0;};
const trackUsage=()=>{const today=new Date().toISOString().split("T")[0];const d=ls.get("bfai_usage",{});const c=(d.date===today?d.count:0)+1;ls.set("bfai_usage",{date:today,count:c});return c;};

// ── Gemini ────────────────────────────────────────────────────────────────────
async function callGemini(prompt){
  const key=getKey();
  if(!key)throw{code:"NO_KEY"};
  const res=await fetch(`${GEMINI_URL}?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.85,maxOutputTokens:8192}})});
  const data=await res.json();
  if(!res.ok){
    if(res.status===401||res.status===403)throw{code:"BAD_KEY"};
    if(res.status===429||data?.error?.status==="RESOURCE_EXHAUSTED")throw{code:"QUOTA"};
    throw{code:"ERROR",msg:data?.error?.message||`HTTP ${res.status}`};
  }
  const text=data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text){if(data?.candidates?.[0]?.finishReason==="SAFETY")throw{code:"SAFETY"};throw{code:"EMPTY"};}
  return text;
}
const errMsg=e=>{const c=e?.code||"ERROR";if(c==="NO_KEY"||c==="BAD_KEY")return"🔑 API key missing or invalid — check Settings.";if(c==="QUOTA")return"⏳ Daily Gemini limit reached. Resets at midnight Pacific Time. Progress saved!";if(c==="SAFETY")return"Content blocked by safety filter. Try rephrasing.";return e?.msg||"Something went wrong. Please try again.";};

// ── Helpers ───────────────────────────────────────────────────────────────────
function Spin({size="h-5 w-5"}){return<svg className={`spin ${size}`} fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>;}

function ScoreBadge({score}){
  const color=score>=80?"text-green-400 border-green-500/40 bg-green-500/10":score>=60?"text-amber-400 border-amber-500/40 bg-amber-500/10":"text-red-400 border-red-500/40 bg-red-500/10";
  return<span className={`text-sm font-bold px-3 py-1 rounded-full border ${color}`}>{score}/100</span>;
}

// ── Settings Modal ────────────────────────────────────────────────────────────
function SettingsModal({onClose}){
  const [draft,setDraft]=useState(getKey());
  const [saved,setSaved]=useState(false);
  const save=()=>{if(!draft.trim())return;setKey(draft);setSaved(true);setTimeout(()=>{setSaved(false);onClose();},900);};
  return(
    <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
      <div className="bg-slate-800 border border-white/10 rounded-2xl p-8 max-w-md w-full shadow-2xl">
        <div className="flex items-center justify-between mb-6">
          <h2 className="text-white text-xl font-bold">⚙️ Settings</h2>
          <button onClick={onClose} className="text-white/30 hover:text-white text-xl">✕</button>
        </div>
        <label className="text-white/60 text-sm font-medium block mb-2">Gemini API Key</label>
        <p className="text-white/35 text-xs mb-3">Stored only in your browser. Used for all book generation — enter once, works everywhere.</p>
        <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="inline-block text-purple-400 text-xs underline mb-4 hover:text-purple-300">Get a free key at Google AI Studio →</a>
        <input type="password" placeholder="AIza..." value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()}
          className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-purple-500 mb-5 font-mono text-sm"/>
        <button onClick={save} disabled={!draft.trim()}
          className={`w-full py-3 rounded-xl font-semibold transition-all ${saved?"bg-green-500 text-white":"bg-gradient-to-r from-purple-500 to-pink-500 text-white hover:opacity-90 disabled:opacity-50"}`}>
          {saved?"✅ Saved!":"Save API Key"}
        </button>
      </div>
    </div>
  );
}

// ── Header ────────────────────────────────────────────────────────────────────
function Header({onBack,title,subtitle,onSettings,activeTab,setActiveTab}){
  const [usage,setUsage]=useState(getUsage());
  useEffect(()=>{const t=setInterval(()=>setUsage(getUsage()),3000);return()=>clearInterval(t);},[]);
  const pct=Math.min(Math.round((usage/DAILY_LIMIT)*100),100);
  const key=getKey();
  return(
    <div className="border-b border-white/10 bg-black/30 backdrop-blur-sm sticky top-0 z-20">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
        <div className="flex items-center gap-3 min-w-0">
          {onBack&&<button onClick={onBack} className="text-white/40 hover:text-white text-sm shrink-0 transition-colors">← Back</button>}
          <div className="w-9 h-9 bg-gradient-to-br from-purple-500 to-pink-500 rounded-xl flex items-center justify-center text-lg shrink-0">📚</div>
          <div className="min-w-0">
            <h1 className="text-white font-bold text-base leading-tight truncate">{title||"BookForge AI"}</h1>
            {subtitle&&<p className="text-white/30 text-xs truncate">{subtitle}</p>}
          </div>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          <div className="bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 flex items-center gap-2">
            <span className={`text-xs font-bold ${pct>=90?"text-red-400":pct>=70?"text-amber-400":"text-green-400"}`}>{usage}/{DAILY_LIMIT}</span>
            <div className="w-10 h-1 bg-white/10 rounded-full overflow-hidden">
              <div className={`h-full rounded-full transition-all ${pct>=90?"bg-red-500":pct>=70?"bg-amber-500":"bg-green-500"}`} style={{width:`${pct}%`}}/>
            </div>
          </div>
          <button onClick={onSettings} className={`text-xs px-3 py-1.5 rounded-lg border transition-all ${key?"border-white/20 text-white/50 hover:border-white/40":"border-red-500/50 text-red-400 bg-red-500/10 pulse"}`}>
            {key?"⚙️ Settings":"⚠️ Set API Key"}
          </button>
        </div>
      </div>
      {/* Main nav tabs */}
      {setActiveTab&&(
        <div className="max-w-7xl mx-auto px-4 sm:px-6 flex gap-1">
          {[["📚 Library","library"],["📗 Series","series"]].map(([label,id])=>(
            <button key={id} onClick={()=>setActiveTab(id)}
              className={`px-4 py-2.5 text-sm font-medium whitespace-nowrap rounded-t-lg transition-all ${activeTab===id?"bg-white/10 text-white border-b-2 border-purple-500":"text-white/35 hover:text-white/70"}`}>
              {label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// REVIEW AGENT
// ══════════════════════════════════════════════════════════════════════════════
async function runReviewAgent(book){
  const outline=JSON.parse(book.outline||"{}");
  const raw=await callGemini(
    `You are a professional book publishing strategist and Amazon KDP expert.\n\n`+
    `Review this book for market-readiness and discoverability. Be critical and specific.\n\n`+
    `Book Details:\n`+
    `Title: ${book.title}\nSubtitle: ${book.subtitle||"(none)"}\nGenre: ${book.genre}\n`+
    `Target Audience: ${book.target_audience}\nSEO Title: ${book.seo_title||"(not set)"}\n`+
    `SEO Description: ${book.seo_description||"(not set)"}\nKeywords: ${book.seo_keywords||"(not set)"}\n`+
    `Description: ${outline.description||book.description}\n\n`+
    `Evaluate:\n`+
    `1. Title appeal & marketability (is it compelling, genre-appropriate, searchable?)\n`+
    `2. Keyword strength (will readers find this book? are keywords competitive?)\n`+
    `3. SEO description quality (does it hook the reader and include search terms?)\n`+
    `4. Subtitle effectiveness (does it add context and keywords?)\n`+
    `5. Overall market differentiation (does this book stand out in its category?)\n\n`+
    `Respond ONLY with valid JSON:\n`+
    `{"overall_score":85,"title_score":80,"keyword_score":75,"seo_score":85,"differentiation_score":80,`+
    `"verdict":"PASS","verdict_reason":"One sentence summary of verdict.",`+
    `"strengths":["strength 1","strength 2","strength 3"],`+
    `"issues":["specific issue 1","specific issue 2"],`+
    `"title_suggestions":["Better Title: Subtitle","Alternative Title 2"],`+
    `"keyword_suggestions":["keyword 1","keyword 2","keyword 3","keyword 4","keyword 5"],`+
    `"seo_rewrite":"A rewritten, stronger SEO description.",`+
    `"subtitle_suggestion":"A stronger subtitle suggestion."}`+
    `\n\nVerdict must be "PASS" if overall_score>=70, otherwise "FAIL".`
  );
  trackUsage();
  const match=raw.match(/\{[\s\S]*\}/);
  if(!match)throw{code:"PARSE",msg:"Could not parse review."};
  return JSON.parse(match[0]);
}

// ── Review Panel (used inside Editor) ────────────────────────────────────────
function ReviewPanel({book,onApply,onSettings}){
  const [review,setReview]=useState(book.review||null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [applied,setApplied]=useState({});

  const run=async()=>{
    if(!getKey()){onSettings();return;}
    setLoading(true);setError("");
    try{
      const r=await runReviewAgent(book);
      setReview(r);
      updateBook(book.id,{review:r});
    }catch(e){setError(errMsg(e));}
    finally{setLoading(false);}
  };

  const applyTitle=(t)=>{
    const parts=t.split(":");
    const title=parts[0].trim();
    const subtitle=parts.slice(1).join(":").trim();
    onApply({title,subtitle:subtitle||book.subtitle});
    setApplied(a=>({...a,title:true}));
  };
  const applyKeywords=(kws)=>{onApply({seo_keywords:kws.join(", ")});setApplied(a=>({...a,kws:true}));};
  const applySEO=(d)=>{onApply({seo_description:d});setApplied(a=>({...a,seo:true}));};
  const applySubtitle=(s)=>{onApply({subtitle:s});setApplied(a=>({...a,sub:true}));};

  return(
    <div className="max-w-3xl mx-auto space-y-5">
      {/* Header card */}
      <div className="bg-white/5 border border-white/10 rounded-2xl p-6">
        <div className="flex items-start justify-between gap-4 mb-4">
          <div>
            <h2 className="text-white text-xl font-bold">🤖 AI Review Agent</h2>
            <p className="text-white/40 text-sm mt-1">Scores your title, keywords & SEO before publishing. Must pass (70+) to unlock downloads.</p>
          </div>
          {review&&<ScoreBadge score={review.overall_score}/>}
        </div>
        {error&&<div className="bg-red-500/20 border border-red-500/30 text-red-300 rounded-xl p-4 mb-4 text-sm">{error}</div>}
        <button onClick={run} disabled={loading}
          className="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-3.5 rounded-xl font-semibold hover:opacity-90 disabled:opacity-50 flex items-center justify-center gap-2">
          {loading?<><Spin/>Reviewing your book…</>:review?"🔄 Re-run Review":"🤖 Run Review Agent"}
        </button>
      </div>

      {review&&(<>
        {/* Verdict */}
        <div className={`rounded-2xl p-5 border ${review.verdict==="PASS"?"bg-green-500/10 border-green-500/30":"bg-red-500/10 border-red-500/30"}`}>
          <div className="flex items-center gap-3 mb-2">
            <span className="text-2xl">{review.verdict==="PASS"?"✅":"❌"}</span>
            <div>
              <p className={`font-bold text-lg ${review.verdict==="PASS"?"text-green-300":"text-red-300"}`}>
                {review.verdict==="PASS"?"Approved for Publishing":"Not Ready — Action Required"}
              </p>
              <p className="text-white/50 text-sm">{review.verdict_reason}</p>
            </div>
          </div>
        </div>

        {/* Score breakdown */}
        <div className="bg-white/5 border border-white/10 rounded-2xl p-5">
          <h3 className="text-white font-semibold mb-4">Score Breakdown</h3>
          <div className="space-y-3">
            {[["📖 Title","title_score"],["🔑 Keywords","keyword_score"],["🔍 SEO Description","seo_score"],["⭐ Differentiation","differentiation_score"]].map(([label,key])=>(
              <div key={key}>
                <div className="flex justify-between text-sm mb-1">
                  <span className="text-white/60">{label}</span>
                  <span className={`font-bold ${review[key]>=80?"text-green-400":review[key]>=60?"text-amber-400":"text-red-400"}`}>{review[key]}/100</span>
                </div>
                <div className="h-1.5 bg-white/10 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full ${review[key]>=80?"bg-green-500":review[key]>=60?"bg-amber-500":"bg-red-500"}`} style={{width:`${review[key]}%`}}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Strengths & Issues */}
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div className="bg-green-500/10 border border-green-500/20 rounded-2xl p-5">
            <h3 className="text-green-300 font-semibold mb-3">✅ Strengths</h3>
            <ul className="space-y-2">
              {review.strengths?.map((s,i)=><li key={i} className="text-white/70 text-sm flex gap-2"><span className="text-green-400 shrink-0">•</span>{s}</li>)}
            </ul>
          </div>
          <div className="bg-red-500/10 border border-red-500/20 rounded-2xl p-5">
            <h3 className="text-red-300 font-semibold mb-3">⚠️ Issues</h3>
            {review.issues?.length>0
              ?<ul className="space-y-2">{review.issues.map((s,i)=><li key={i} className="text-white/70 text-sm flex gap-2"><span className="text-red-400 shrink-0">•</span>{s}</li>)}</ul>
              :<p className="text-white/40 text-sm italic">No major issues found.</p>}
          </div>
        </div>

        {/* Title suggestions */}
        {review.title_suggestions?.length>0&&(
          <div className="bg-white/5 border border-white/10 rounded-2xl p-5">
            <h3 className="text-white font-semibold mb-3">📖 Stronger Title Suggestions</h3>
            <div className="space-y-2">
              {review.title_suggestions.map((t,i)=>(
                <div key={i} className="flex items-center justify-between gap-3 bg-white/5 rounded-xl px-4 py-3">
                  <p className="text-white/80 text-sm flex-1">{t}</p>
                  <button onClick={()=>applyTitle(t)} className={`text-xs px-3 py-1.5 rounded-lg border transition-all shrink-0 ${applied.title?"border-green-500/40 text-green-400 bg-green-500/10":"border-purple-500/40 text-purple-300 hover:bg-purple-500/20"}`}>
                    {applied.title?"Applied ✓":"Apply"}
                  </button>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Subtitle */}
        {review.subtitle_suggestion&&(
          <div className="bg-white/5 border border-white/10 rounded-2xl p-5">
            <h3 className="text-white font-semibold mb-2">📝 Subtitle Suggestion</h3>
            <div className="flex items-center justify-between gap-3 bg-white/5 rounded-xl px-4 py-3">
              <p className="text-white/80 text-sm flex-1 italic">"{review.subtitle_suggestion}"</p>
              <button onClick={()=>applySubtitle(review.subtitle_suggestion)} className={`text-xs px-3 py-1.5 rounded-lg border transition-all shrink-0 ${applied.sub?"border-green-500/40 text-green-400 bg-green-500/10":"border-purple-500/40 text-purple-300 hover:bg-purple-500/20"}`}>
                {applied.sub?"Applied ✓":"Apply"}
              </button>
            </div>
          </div>
        )}

        {/* Keyword suggestions */}
        {review.keyword_suggestions?.length>0&&(
          <div className="bg-white/5 border border-white/10 rounded-2xl p-5">
            <h3 className="text-white font-semibold mb-3">🔑 Keyword Suggestions</h3>
            <div className="flex flex-wrap gap-2 mb-3">
              {review.keyword_suggestions.map((k,i)=><span key={i} className="bg-purple-500/20 text-purple-300 text-xs px-3 py-1.5 rounded-full border border-purple-500/30">{k}</span>)}
            </div>
            <button onClick={()=>applyKeywords(review.keyword_suggestions)} className={`text-sm px-4 py-2 rounded-lg border transition-all ${applied.kws?"border-green-500/40 text-green-400 bg-green-500/10":"border-purple-500/40 text-purple-300 hover:bg-purple-500/20"}`}>
              {applied.kws?"Keywords Applied ✓":"Apply These Keywords"}
            </button>
          </div>
        )}

        {/* SEO rewrite */}
        {review.seo_rewrite&&(
          <div className="bg-white/5 border border-white/10 rounded-2xl p-5">
            <h3 className="text-white font-semibold mb-2">🔍 Rewritten SEO Description</h3>
            <p className="text-white/70 text-sm leading-relaxed mb-3 bg-white/5 rounded-xl p-4">{review.seo_rewrite}</p>
            <button onClick={()=>applySEO(review.seo_rewrite)} className={`text-sm px-4 py-2 rounded-lg border transition-all ${applied.seo?"border-green-500/40 text-green-400 bg-green-500/10":"border-purple-500/40 text-purple-300 hover:bg-purple-500/20"}`}>
              {applied.seo?"Applied ✓":"Apply This Description"}
            </button>
          </div>
        )}
      </>)}
    </div>
  );
}

// SERIES PAGE — with full World Bible & Character Roster
// ══════════════════════════════════════════════════════════════════════════════

// Update the series bible after a book is written (called from EditorPage)
function updateSeriesBible(seriesId, bookNumber, bookTitle, newCharacters, newLocations, plotEvents){
  const all=getSeries();
  const si=all.findIndex(s=>s.id===seriesId);
  if(si===-1)return;
  const s=all[si];
  // Merge characters
  const roster=s.character_roster||[];
  (newCharacters||[]).forEach(nc=>{
    const existing=roster.findIndex(c=>c.name.toLowerCase()===nc.name.toLowerCase());
    if(existing===-1){roster.push({...nc,first_appears:`Book ${bookNumber}: ${bookTitle}`});}
    else{roster[existing]={...roster[existing],...nc};}
  });
  // Merge locations
  const locations=s.world_locations||[];
  (newLocations||[]).forEach(nl=>{
    if(!locations.find(l=>l.name.toLowerCase()===nl.name.toLowerCase()))locations.push({...nl,first_appears:`Book ${bookNumber}: ${bookTitle}`});
  });
  // Plot events log
  const events=s.plot_events||[];
  (plotEvents||[]).forEach(e=>events.push({book:`Book ${bookNumber}: ${bookTitle}`,event:e}));
  all[si]={...s,character_roster:roster,world_locations:locations,plot_events:events};
  setSeries(all);
}

function buildSeriesContext(series){
  if(!series)return"";
  const p=series.plan||{};
  let ctx=`SERIES BIBLE — "${series.name}"\n`;
  ctx+=`Genre: ${series.genre} | Audience: ${series.audience}\n`;
  ctx+=`Concept: ${series.concept}\n\n`;
  if(p.world_setting)ctx+=`WORLD/SETTING:\n${p.world_setting}\n\n`;
  if(p.world_rules?.length)ctx+=`WORLD RULES/LORE:\n${p.world_rules.map(r=>`• ${r}`).join("\n")}\n\n`;
  if(p.tone_style)ctx+=`SERIES TONE & STYLE: ${p.tone_style}\n\n`;
  if(series.character_roster?.length){
    ctx+=`ESTABLISHED CHARACTERS (must remain consistent):\n`;
    series.character_roster.forEach(c=>{ctx+=`• ${c.name} (${c.role||""}): ${c.description||""} — First appears: ${c.first_appears||""}\n`;});
    ctx+="\n";
  }
  if(series.world_locations?.length){
    ctx+=`ESTABLISHED LOCATIONS:\n`;
    series.world_locations.forEach(l=>{ctx+=`• ${l.name}: ${l.description||""}\n`;});
    ctx+="\n";
  }
  if(series.plot_events?.length){
    ctx+=`KEY SERIES EVENTS SO FAR:\n`;
    series.plot_events.forEach(e=>{ctx+=`• [${e.book}] ${e.event}\n`;});
    ctx+="\n";
  }
  return ctx;
}

function SeriesPage({navigate,onSettings}){
  const [seriesList,setSeriesList]=useState(getSeries());
  const [showCreate,setShowCreate]=useState(false);
  const [viewBible,setViewBible]=useState(null); // series id for bible view
  const [form,setForm]=useState({name:"",concept:"",genre:"",audience:"",book_count:3,tone:""});
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");

  const reload=()=>{const s=getSeries();setSeriesList(s);return s;};

  const createSeries=async()=>{
    if(!getKey()){onSettings();return;}
    if(!form.name||!form.concept||!form.genre||!form.audience){setError("Fill in all fields.");return;}
    setLoading(true);setError("");
    try{
      const raw=await callGemini(
        `You are a master series author and world-builder. Create a comprehensive ${form.book_count}-book series plan.\n`+
        `Series Name: "${form.name}"\nConcept: ${form.concept}\nGenre: ${form.genre}\nAudience: ${form.audience}\n`+
        (form.tone?`Tone/Style: ${form.tone}\n`:"")+
        `\nCreate a rich, cohesive series with a detailed world bible that will keep readers engaged across all ${form.book_count} books.\n\n`+
        `Respond ONLY with valid JSON (no markdown fences):\n`+
        `{"series_description":"A compelling 2-3 sentence series overview",`+
        `"world_setting":"Rich description of the world, time period, and environment",`+
        `"world_rules":["Rule or lore element 1","Rule or lore element 2","Rule or lore element 3"],`+
        `"tone_style":"Description of the series tone, writing style, heat level if romance",`+
        `"series_themes":["theme1","theme2"],`+
        `"recurring_characters":[{"name":"","role":"protagonist/antagonist/supporting","description":"physical appearance, personality, background","arc":"their journey across the series"}],`+
        `"recurring_locations":[{"name":"","description":"vivid description of this location and its significance"}],`+
        `"series_arc":"The overarching conflict or journey that spans all books",`+
        `"books":[{"number":1,"title":"","subtitle":"","description":"200-word compelling description","hook":"The opening hook that grabs readers","main_conflict":"The central conflict of this specific book","character_focus":"Which characters are the main couple/focus","how_it_connects":"How this book connects to the wider series arc","ends_with":"How this book resolves and what it sets up"}]}`
      );
      trackUsage();
      const match=raw.match(/\{[\s\S]*\}/);
      if(!match)throw{code:"PARSE",msg:"Couldn't parse series plan."};
      const plan=JSON.parse(match[0]);
      // Seed character roster from recurring_characters
      const character_roster=(plan.recurring_characters||[]).map(c=>({...c,first_appears:"Series Bible"}));
      const world_locations=(plan.recurring_locations||[]).map(l=>({...l,first_appears:"Series Bible"}));
      const series={
        id:"series_"+Date.now()+"_"+Math.random().toString(36).slice(2,7),
        name:form.name,concept:form.concept,genre:form.genre,audience:form.audience,
        book_count:form.book_count,plan,
        character_roster,world_locations,plot_events:[],
        book_ids:[],
        created_date:new Date().toISOString()
      };
      const all=[series,...getSeries()];
      setSeries(all);setSeriesList(all);
      setShowCreate(false);
      setForm({name:"",concept:"",genre:"",audience:"",book_count:3,tone:""});
    }catch(e){setError(errMsg(e));}
    finally{setLoading(false);}
  };

  const deleteSeries=(id,e)=>{e.stopPropagation();if(!confirm("Delete this series and all its data?"))return;const s=getSeries().filter(x=>x.id!==id);setSeries(s);setSeriesList(s);};

  const buildBook=(series,bookPlan)=>{
    const books=getBooks();
    const book={
      id:"book_"+Date.now()+"_"+Math.random().toString(36).slice(2,7),
      title:bookPlan.title,subtitle:bookPlan.subtitle||"",
      genre:series.genre,target_audience:series.audience,
      description:bookPlan.description,
      series_id:series.id,series_name:series.name,series_number:bookPlan.number,
      chapters:[],outline:"",status:"outlining",word_count:0,
      cover_image_url:"",seo_title:"",seo_description:"",seo_keywords:"",notes:"",review:null,
      needs_outline:true,book_plan:bookPlan,
      auto_build:true,build_step:"Starting…",
      created_date:new Date().toISOString()
    };
    books.unshift(book);setBooks(books);
    const seriesAll=getSeries();
    const si=seriesAll.findIndex(s=>s.id===series.id);
    if(si>-1){seriesAll[si].book_ids=[...(seriesAll[si].book_ids||[]),book.id];setSeries(seriesAll);setSeriesList(seriesAll);}
    navigate("editor",book.id);
  };

  const bibleSeries=viewBible?seriesList.find(s=>s.id===viewBible):null;

  return(
    <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8">

      {/* World Bible Modal */}
      {bibleSeries&&(
        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-slate-800 border border-cyan-500/30 rounded-2xl max-w-3xl w-full max-h-[85vh] overflow-y-auto shadow-2xl">
            <div className="sticky top-0 bg-slate-800 border-b border-white/10 px-6 py-4 flex items-center justify-between">
              <div><h2 className="text-white font-bold text-lg">📖 Series Bible</h2><p className="text-cyan-300 text-sm">{bibleSeries.name}</p></div>
              <button onClick={()=>setViewBible(null)} className="text-white/30 hover:text-white text-2xl">✕</button>
            </div>
            <div className="p-6 space-y-6">
              {/* Overview */}
              <div>
                <h3 className="text-cyan-300 text-xs uppercase tracking-wider font-semibold mb-2">Series Overview</h3>
                <p className="text-white/70 text-sm leading-relaxed">{bibleSeries.plan?.series_description}</p>
              </div>
              {bibleSeries.plan?.series_arc&&(
                <div>
                  <h3 className="text-cyan-300 text-xs uppercase tracking-wider font-semibold mb-2">Series Arc</h3>
                  <p className="text-white/70 text-sm leading-relaxed">{bibleSeries.plan.series_arc}</p>
                </div>
              )}
              {/* World */}
              {bibleSeries.plan?.world_setting&&(
                <div>
                  <h3 className="text-cyan-300 text-xs uppercase tracking-wider font-semibold mb-2">World & Setting</h3>
                  <p className="text-white/70 text-sm leading-relaxed">{bibleSeries.plan.world_setting}</p>
                </div>
              )}
              {bibleSeries.plan?.world_rules?.length>0&&(
                <div>
                  <h3 className="text-cyan-300 text-xs uppercase tracking-wider font-semibold mb-2">World Rules & Lore</h3>
                  <ul className="space-y-1">{bibleSeries.plan.world_rules.map((r,i)=><li key={i} className="text-white/60 text-sm flex gap-2"><span className="text-cyan-400 shrink-0">•</span>{r}</li>)}</ul>
                </div>
              )}
              {bibleSeries.plan?.tone_style&&(
                <div>
                  <h3 className="text-cyan-300 text-xs uppercase tracking-wider font-semibold mb-2">Tone & Style</h3>
                  <p className="text-white/70 text-sm">{bibleSeries.plan.tone_style}</p>
                </div>
              )}
              {/* Characters */}
              {bibleSeries.character_roster?.length>0&&(
                <div>
                  <h3 className="text-cyan-300 text-xs uppercase tracking-wider font-semibold mb-3">Character Roster ({bibleSeries.character_roster.length})</h3>
                  <div className="space-y-3">
                    {bibleSeries.character_roster.map((c,i)=>(
                      <div key={i} className="bg-white/5 border border-white/10 rounded-xl p-4">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="text-white font-semibold text-sm">{c.name}</span>
                          {c.role&&<span className="text-xs bg-purple-500/20 text-purple-300 px-2 py-0.5 rounded-full border border-purple-500/30">{c.role}</span>}
                          {c.first_appears&&<span className="text-xs text-white/25">· {c.first_appears}</span>}
                        </div>
                        {c.description&&<p className="text-white/55 text-xs leading-relaxed mb-1">{c.description}</p>}
                        {c.arc&&<p className="text-cyan-300/50 text-xs italic">{c.arc}</p>}
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {/* Locations */}
              {bibleSeries.world_locations?.length>0&&(
                <div>
                  <h3 className="text-cyan-300 text-xs uppercase tracking-wider font-semibold mb-3">Locations ({bibleSeries.world_locations.length})</h3>
                  <div className="space-y-2">
                    {bibleSeries.world_locations.map((l,i)=>(
                      <div key={i} className="bg-white/5 border border-white/10 rounded-xl p-4">
                        <p className="text-white font-semibold text-sm mb-1">{l.name}<span className="text-white/25 text-xs font-normal ml-2">· {l.first_appears}</span></p>
                        {l.description&&<p className="text-white/55 text-xs leading-relaxed">{l.description}</p>}
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {/* Plot events */}
              {bibleSeries.plot_events?.length>0&&(
                <div>
                  <h3 className="text-cyan-300 text-xs uppercase tracking-wider font-semibold mb-3">Series Timeline</h3>
                  <div className="space-y-2">
                    {bibleSeries.plot_events.map((e,i)=>(
                      <div key={i} className="flex gap-3">
                        <span className="text-cyan-400/50 text-xs shrink-0 pt-0.5">[{e.book}]</span>
                        <p className="text-white/55 text-xs">{e.event}</p>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      <div className="flex justify-between items-center mb-6">
        <h2 className="text-white text-xl font-bold">📗 Series Manager</h2>
        <button onClick={()=>setShowCreate(!showCreate)} className="bg-gradient-to-r from-cyan-500 to-blue-500 text-white px-5 py-2.5 rounded-xl font-semibold hover:opacity-90">+ New Series</button>
      </div>

      {/* Create form */}
      {showCreate&&(
        <div className="bg-white/5 border border-cyan-500/30 rounded-2xl p-6 mb-8">
          <h3 className="text-white font-bold text-lg mb-1">Plan Your Series</h3>
          <p className="text-white/40 text-sm mb-5">Gemini will generate a full series bible — world rules, character roster, locations, and individual book plans.</p>
          {error&&<div className="bg-red-500/20 border border-red-500/30 text-red-300 rounded-xl p-4 mb-4 text-sm">{error}</div>}
          <div className="space-y-4">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label className="text-white/60 text-sm font-medium block mb-2">Series Name *</label>
                <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder='E.g. "The Rival Hearts Series"'
                  className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/25 focus:outline-none focus:border-cyan-500 text-sm"/>
              </div>
              <div>
                <label className="text-white/60 text-sm font-medium block mb-2">Number of Books *</label>
                <select value={form.book_count} onChange={e=>setForm({...form,book_count:Number(e.target.value)})}
                  className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 text-sm">
                  {[2,3,4,5,6,7,8,9,10].map(n=><option key={n} value={n}>{n} Books</option>)}
                </select>
              </div>
            </div>
            <div>
              <label className="text-white/60 text-sm font-medium block mb-2">Series Concept *</label>
              <textarea rows={3} value={form.concept} onChange={e=>setForm({...form,concept:e.target.value})}
                placeholder='E.g. "Standalone gay romance novels set in a competitive sports world, each book a different couple, all interconnected through the same team and city"'
                className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/25 focus:outline-none focus:border-cyan-500 resize-none text-sm"/>
            </div>
            <div>
              <label className="text-white/60 text-sm font-medium block mb-2">Tone & Style <span className="text-white/25">(optional)</span></label>
              <input value={form.tone} onChange={e=>setForm({...form,tone:e.target.value})} placeholder='E.g. "Steamy, emotionally intense, HEA guaranteed, slow burn"'
                className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/25 focus:outline-none focus:border-cyan-500 text-sm"/>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label className="text-white/60 text-sm font-medium block mb-2">Genre *</label>
                <select value={form.genre} onChange={e=>setForm({...form,genre:e.target.value})}
                  className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 text-sm">
                  <option value="">Select genre…</option>
                  {GENRES.map(g=><option key={g} value={g}>{g}</option>)}
                </select>
              </div>
              <div>
                <label className="text-white/60 text-sm font-medium block mb-2">Target Audience *</label>
                <select value={form.audience} onChange={e=>setForm({...form,audience:e.target.value})}
                  className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 text-sm">
                  <option value="">Select audience…</option>
                  {AUDIENCES.map(a=><option key={a} value={a}>{a}</option>)}
                </select>
              </div>
            </div>
            <div className="flex gap-3">
              <button onClick={()=>{setShowCreate(false);setError("");}} className="flex-1 border border-white/20 text-white/50 py-3 rounded-xl hover:bg-white/5 text-sm">Cancel</button>
              <button onClick={createSeries} disabled={loading||!form.name||!form.concept||!form.genre||!form.audience}
                className="flex-[2] bg-gradient-to-r from-cyan-500 to-blue-500 text-white py-3 rounded-xl font-semibold hover:opacity-90 disabled:opacity-40 flex items-center justify-center gap-2">
                {loading?<><Spin/>Generating series bible…</>:"✨ Generate Series Plan"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Series list */}
      {seriesList.length===0&&!showCreate?(
        <div className="text-center py-20">
          <div className="text-7xl mb-4">📗</div>
          <h2 className="text-white text-xl font-bold mb-2">No series yet</h2>
          <p className="text-white/40 mb-6">Build a multi-book world with shared characters, locations, and lore</p>
          <button onClick={()=>setShowCreate(true)} className="bg-gradient-to-r from-cyan-500 to-blue-500 text-white px-8 py-3.5 rounded-xl font-semibold text-lg hover:opacity-90">+ Create Your First Series</button>
        </div>
      ):(
        <div className="space-y-6">
          {seriesList.map(series=>(
            <div key={series.id} className="bg-white/5 border border-white/10 rounded-2xl overflow-hidden">
              <div className="p-6 border-b border-white/10">
                <div className="flex items-start justify-between gap-4 flex-wrap">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-2 flex-wrap">
                      <span className="bg-cyan-500/20 text-cyan-300 text-xs px-2.5 py-1 rounded-full border border-cyan-500/30">{series.book_count} Books</span>
                      <span className="bg-white/10 text-white/40 text-xs px-2.5 py-1 rounded-full">{series.genre}</span>
                      <span className="bg-white/10 text-white/40 text-xs px-2.5 py-1 rounded-full">{series.audience}</span>
                      {series.character_roster?.length>0&&<span className="bg-purple-500/20 text-purple-300 text-xs px-2.5 py-1 rounded-full border border-purple-500/20">👥 {series.character_roster.length} chars</span>}
                      {series.world_locations?.length>0&&<span className="bg-blue-500/20 text-blue-300 text-xs px-2.5 py-1 rounded-full border border-blue-500/20">📍 {series.world_locations.length} locations</span>}
                    </div>
                    <h3 className="text-white text-xl font-bold">{series.name}</h3>
                    <p className="text-white/50 text-sm mt-1 line-clamp-2">{series.plan?.series_description}</p>
                    {series.plan?.tone_style&&<p className="text-cyan-300/50 text-xs mt-1 italic">{series.plan.tone_style}</p>}
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                    <button onClick={()=>setViewBible(series.id)} className="text-xs border border-cyan-500/40 text-cyan-300 px-3 py-2 rounded-lg hover:bg-cyan-500/10">📖 View Bible</button>
                    <button onClick={e=>deleteSeries(series.id,e)} className="text-white/20 hover:text-red-400 transition-colors text-sm px-2">🗑</button>
                  </div>
                </div>
                {/* Series arc */}
                {series.plan?.series_arc&&(
                  <div className="mt-4 bg-white/5 rounded-xl p-3">
                    <p className="text-white/25 text-xs uppercase tracking-wider mb-1">Series Arc</p>
                    <p className="text-white/55 text-xs leading-relaxed">{series.plan.series_arc}</p>
                  </div>
                )}
              </div>

              {/* Books grid */}
              <div className="p-4">
                <p className="text-white/30 text-xs uppercase tracking-wider mb-3 px-2">Books in This Series</p>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                  {series.plan?.books?.map((bp,i)=>{
                    const existingBook=series.book_ids?.map(id=>getBook(id)).find(b=>b&&b.series_number===bp.number);
                    return(
                      <div key={i} className="bg-white/5 border border-white/10 rounded-xl p-4 hover:border-white/20 transition-all">
                        <div className="flex items-center gap-2 mb-2">
                          <span className="w-6 h-6 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center text-xs font-bold text-white">{bp.number}</span>
                          {existingBook&&<span className={`text-xs px-2 py-0.5 rounded-full ${STATUS_COLORS[existingBook.status]||""}`}>{STATUS_ICONS[existingBook.status]} {existingBook.status}</span>}
                        </div>
                        <h4 className="text-white font-semibold text-sm leading-tight mb-0.5">{bp.title}</h4>
                        {bp.subtitle&&<p className="text-purple-300/70 text-xs mb-2">{bp.subtitle}</p>}
                        {bp.character_focus&&<p className="text-cyan-300/50 text-xs mb-1">👥 {bp.character_focus}</p>}
                        <p className="text-white/35 text-xs leading-relaxed mb-3 line-clamp-3">{bp.description}</p>
                        {bp.how_it_connects&&<p className="text-white/20 text-xs italic mb-3 line-clamp-2">🔗 {bp.how_it_connects}</p>}
                        {existingBook
                          ?<button onClick={()=>navigate("editor",existingBook.id)} className="w-full text-xs border border-white/20 text-white/50 py-2 rounded-lg hover:bg-white/5 transition-colors">Open Editor →</button>
                          :<button onClick={()=>buildBook(series,bp)} className="w-full text-xs bg-gradient-to-r from-purple-500 to-pink-500 text-white py-2 rounded-lg hover:opacity-90">✨ Build This Book</button>}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

                </div>
                <div className="p-5">
                  <h3 className="text-white font-bold text-base leading-tight mb-1 line-clamp-2">{book.title||"Untitled"}</h3>
                  {book.subtitle&&<p className="text-white/40 text-sm mb-2 line-clamp-1">{book.subtitle}</p>}
                  <div className="flex items-center justify-between mt-2">
                    <span className="text-white/25 text-xs">{book.genre}</span>
                    <span className="text-white/25 text-xs">{book.word_count?`${Number(book.word_count).toLocaleString()} words`:"0 words"}</span>
                  </div>
                  {book.chapters?.length>0&&(
                    <div className="mt-3">
                      <div className="h-1 bg-white/10 rounded-full overflow-hidden">
                        <div className="h-full bg-gradient-to-r from-purple-500 to-pink-500 rounded-full" style={{width:`${pct(book)}%`}}/>
                      </div>
                      <p className="text-white/20 text-xs mt-1">{book.chapters.filter(c=>c.generated).length}/{book.chapters.length} chapters</p>
                    </div>
                  )}
                </div>
              </div>
              <button onClick={e=>del(book.id,e)} className="absolute top-2 left-2 w-7 h-7 bg-red-500/80 hover:bg-red-600 rounded-full text-white text-xs opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center shadow">✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// CREATE PAGE
// ══════════════════════════════════════════════════════════════════════════════
function CreatePage({navigate,onSettings}){
  const [step,setStep]=useState(1);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [outline,setOutline]=useState(null);
  const [form,setForm]=useState({topic:"",genre:"",audience:""});

  const generate=async()=>{
    if(!getKey()){onSettings();return;}
    if(!form.topic||!form.genre||!form.audience){setError("Please fill in all three fields.");return;}
    setLoading(true);setError("");
    try{
      const raw=await callGemini(
        "You are a bestselling author. Create a detailed book outline.\n"+
        "Topic/Idea: "+form.topic+"\nGenre: "+form.genre+"\nTarget Audience: "+form.audience+"\n\n"+
        'Respond ONLY with valid JSON (no markdown fences):\n'+
        '{"title":"","subtitle":"","description":"","themes":[""],"estimated_word_count":50000,"chapters":[{"number":1,"title":"","description":""}]}'
      );
      trackUsage();
      const match=raw.match(/\{[\s\S]*\}/);
      if(!match)throw{code:"PARSE",msg:"Couldn't parse outline."};
      setOutline(JSON.parse(match[0]));setStep(2);
    }catch(e){setError(errMsg(e));}
    finally{setLoading(false);}
  };

  const approve=()=>{
    const books=getBooks();
    const book={
      id:"book_"+Date.now()+"_"+Math.random().toString(36).slice(2,7),
      title:outline.title,subtitle:outline.subtitle||"",
      genre:form.genre,target_audience:form.audience,
      description:outline.description,themes:outline.themes||[],
      estimated_word_count:outline.estimated_word_count||50000,
      chapters:(outline.chapters||[]).map(c=>({...c,content:"",generated:false})),
      outline:JSON.stringify(outline),status:"writing",
      word_count:0,cover_image_url:"",
      seo_title:"",seo_description:"",seo_keywords:"",notes:"",review:null,
      auto_build:true,build_step:"Starting…",
      created_date:new Date().toISOString()
    };
    books.unshift(book);setBooks(books);
    navigate("editor",book.id);
  };

  return(
    <div className="max-w-3xl mx-auto px-4 sm:px-6 py-8">
      <div className="flex items-center gap-3 mb-8">
        {["Book Concept","Review & Approve"].map((label,i)=>(
          <div key={i} className="flex items-center gap-2">
            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${step>i+1?"bg-green-500 text-white":step===i+1?"bg-purple-500 text-white":"bg-white/10 text-white/30"}`}>{step>i+1?"✓":i+1}</div>
            <span className={`text-sm ${step===i+1?"text-white":"text-white/30"}`}>{label}</span>
            {i<1&&<div className="w-10 h-px bg-white/20 mx-1"/>}
          </div>
        ))}
      </div>
      {error&&<div className="bg-red-500/20 border border-red-500/30 text-red-300 rounded-xl p-4 mb-5 text-sm">{error}</div>}
      {step===1&&(
        <div className="bg-white/5 border border-white/10 rounded-2xl p-6 sm:p-8">
          <h2 className="text-white text-xl font-bold mb-1">Your Book Idea</h2>
          <p className="text-white/40 mb-6 text-sm">Approve the outline and BookForge auto-writes every chapter, generates SEO, creates the cover, then runs the Review Agent before publishing.</p>
          <div className="space-y-6">
            <div>
              <label className="text-white/70 text-sm font-medium block mb-2">Topic / Story Idea *</label>
              <textarea rows={4} placeholder='E.g. "Two gay college athletes fall in love across rival teams during championship season"'
                value={form.topic} onChange={e=>setForm({...form,topic:e.target.value})}
                className="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/25 focus:outline-none focus:border-purple-500 resize-none text-sm"/>
            </div>
            <div>
              <label className="text-white/70 text-sm font-medium block mb-3">Genre *</label>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                {GENRES.map(g=><button key={g} onClick={()=>setForm({...form,genre:g})}
                  className={`text-xs px-3 py-2 rounded-lg border text-left transition-all ${form.genre===g?"border-purple-500 bg-purple-500/25 text-white":"border-white/15 text-white/40 hover:border-white/30 hover:text-white/70"}`}>{g}</button>)}
              </div>
            </div>
            <div>
              <label className="text-white/70 text-sm font-medium block mb-3">Target Audience *</label>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                {AUDIENCES.map(a=><button key={a} onClick={()=>setForm({...form,audience:a})}
                  className={`text-xs px-3 py-2 rounded-lg border text-left transition-all ${form.audience===a?"border-purple-500 bg-purple-500/25 text-white":"border-white/15 text-white/40 hover:border-white/30 hover:text-white/70"}`}>{a}</button>)}
              </div>
            </div>
            <button onClick={generate} disabled={loading||!form.topic.trim()||!form.genre||!form.audience}
              className="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-4 rounded-xl font-semibold text-lg hover:opacity-90 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2">
              {loading?<><Spin/>Generating outline…</>:"✨ Generate Book Outline"}
            </button>
          </div>
        </div>
      )}
      {step===2&&outline&&(
        <div className="space-y-5">
          <div className="bg-white/5 border border-white/10 rounded-2xl p-6 sm:p-8">
            <div className="flex items-start justify-between mb-5 gap-4">
              <div><h2 className="text-white text-xl font-bold">{outline.title}</h2>{outline.subtitle&&<p className="text-purple-300 mt-1 text-sm">{outline.subtitle}</p>}</div>
              <span className="bg-green-500/20 text-green-400 text-xs px-3 py-1 rounded-full border border-green-500/30 whitespace-nowrap">AI Generated</span>
            </div>
            <div className="bg-white/5 rounded-xl p-4 mb-5">
              <p className="text-white/40 text-xs uppercase tracking-wider mb-2">Description</p>
              <p className="text-white/80 text-sm leading-relaxed">{outline.description}</p>
            </div>
            <p className="text-white/40 text-xs uppercase tracking-wider mb-3">Chapters ({outline.chapters?.length})</p>
            <div className="space-y-2 max-h-72 overflow-y-auto pr-1">
              {outline.chapters?.map((ch,i)=>(
                <div key={i} className="bg-white/5 rounded-lg px-4 py-3 flex gap-3">
                  <span className="text-purple-400 font-bold text-sm min-w-[24px]">{ch.number}.</span>
                  <div><p className="text-white text-sm font-medium">{ch.title}</p>{ch.description&&<p className="text-white/35 text-xs mt-0.5">{ch.description}</p>}</div>
                </div>
              ))}
            </div>
            {outline.estimated_word_count&&<p className="text-white/30 text-sm mt-4">📊 ~{outline.estimated_word_count.toLocaleString()} words estimated</p>}
          </div>
          <div className="bg-gradient-to-br from-purple-900/60 to-pink-900/40 border border-purple-500/30 rounded-2xl p-6">
            <h3 className="text-white font-bold text-lg mb-1">🚀 Approve & Auto-Build</h3>
            <p className="text-white/50 text-sm mb-5">Approving writes all chapters → generates SEO → creates cover → runs the Review Agent automatically.</p>
            <div className="flex gap-3">
              <button onClick={()=>{setStep(1);setOutline(null);setError("");}} className="flex-1 border border-white/20 text-white/50 py-3 rounded-xl hover:bg-white/5 text-sm">← Regenerate</button>
              <button onClick={approve} className="flex-[2] bg-gradient-to-r from-purple-500 to-pink-500 text-white py-3 px-6 rounded-xl font-bold text-lg hover:opacity-90 flex items-center justify-center gap-2">✅ Approve & Build Book</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
